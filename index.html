<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global EdTech | Premium Campus</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel to compile JSX -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- EmailJS for FREE Email Sending -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        // Initialize EmailJS (Replace with your actual Public Key from emailjs.com to make it work)
        (function() { emailjs.init("YOUR_EMAILJS_PUBLIC_KEY"); })();
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#4f46e5', secondary: '#1e293b', accent: '#ec4899', background: '#f8fafc' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; height: 6px;}
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .toggle-checkbox:checked { right: 0; border-color: #4f46e5; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4f46e5; }
        .toggle-checkbox:checked + .toggle-label:before { transform: translateX(100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icons = {
            GraduationCap: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Video: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Bell: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
            ClipboardCheck: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><polyline points="9 14 11 16 15 11"></polyline></svg>,
            XCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        };

        // --- DATABASE v5 (Everything Included) ---
        const todayStr = new Date().toISOString().split('T')[0];

        const DEFAULT_DATA = {
            name: "Apex Global Academy",
            about: "A premier institution dedicated to academic excellence, holistic development, and modern learning methodologies since 1995. We prepare students for global success through technology-integrated classrooms.",
            stats: { students: "2,500+", teachers: "150+", programs: "40+" },
            classes: ["1st Standard", "2nd Standard", "9th Standard", "10th Standard"],
            users: {
                "teacher10@school.com": { email: "teacher10@school.com", name: "Mrs. Smith", role: "teacher", classAssigned: "10th Standard" },
                "student10@school.com": { email: "student10@school.com", name: "John Student", role: "student", grade: "10th Standard", attendance: 92, marks: { Math: 85, Science: 90, English: 78 }, parentName: "Robert Student", parentPhone: "+1-555-0102", parentEmail: "robert@family.com" },
                "student1@school.com": { email: "student1@school.com", name: "Little Timmy", role: "student", grade: "1st Standard", attendance: 98, marks: { Math: 95, Art: 99, Reading: 92 }, parentName: "Sarah Parent", parentPhone: "+1-555-0100", parentEmail: "sarah@family.com" }
            },
            timetable: [
                { id: 1, grade: "10th Standard", time: "09:00 AM", subject: "Advanced Math", teacher: "Prof. Jenkins" },
                { id: 2, grade: "10th Standard", time: "10:30 AM", subject: "Physics", teacher: "Dr. Grant" },
                { id: 3, grade: "1st Standard", time: "09:00 AM", subject: "Basic Counting", teacher: "Mrs. Davis" }
            ],
            notices: [
                { id: 1, date: "Today", title: "Welcome to the New Semester", content: "Dear Students and Parents,\n\nWe are thrilled to welcome you back to campus. Please ensure all textbooks are purchased by Friday.", type: "Info", targetClass: "All" }
            ],
            videos: [
                { id: 1, title: "Calculus Fundamentals", teacher: "Mrs. Smith", subject: "Math", targetClass: "10th Standard", url: "https://www.youtube.com/embed/p_o4aY7vkXg" }
            ],
            leaves: [
                { id: 1, studentEmail: "student10@school.com", studentName: "John Student", grade: "10th Standard", date: todayStr, reason: "Attending a family wedding out of state.", status: "Pending", note: "" }
            ]
        };

        const loadDB = () => {
            const saved = localStorage.getItem('EdTechData_v5');
            if (saved) return JSON.parse(saved);
            localStorage.setItem('EdTechData_v5', JSON.stringify(DEFAULT_DATA));
            return DEFAULT_DATA;
        };
        const saveDB = (newData) => localStorage.setItem('EdTechData_v5', JSON.stringify(newData));

        const getYoutubeEmbedUrl = (url) => {
            if (!url) return ''; let videoId = '';
            try {
                if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
                else if (url.includes('watch?v=')) videoId = url.split('watch?v=')[1].split('&')[0];
                else if (url.includes('embed/')) return url;
            } catch (e) { return null; }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        };

        const calculatePercentage = (marks) => {
            if (!marks) return 0; const subjects = Object.values(marks);
            if (subjects.length === 0) return 0;
            const total = subjects.reduce((sum, mark) => sum + parseInt(mark || 0), 0);
            return (total / (subjects.length * 100)) * 100;
        };

        // --- CUSTOM TOAST NOTIFICATION ---
        const Toast = ({ message, onClose }) => (
            <div className="fixed bottom-4 right-4 md:bottom-8 md:right-8 bg-gray-900 text-white p-4 rounded-xl shadow-2xl z-[100] flex items-start space-x-3 fade-in max-w-sm md:max-w-md border-l-4 border-green-400">
                <div className="mt-0.5 text-green-400"><Icons.Bell /></div>
                <div className="flex-1">
                    <h4 className="font-bold text-sm mb-1">System Action</h4>
                    <p className="text-xs text-gray-300 whitespace-pre-wrap">{message}</p>
                </div>
                <button onClick={onClose} className="text-gray-400 hover:text-white"><Icons.XCircle /></button>
            </div>
        );

        // --- COMPONENTS ---

        // 1. Enhanced Landing Page (Mobile Responsive)
        const LandingPage = ({ onNavigate, db }) => (
            <div className="min-h-screen flex flex-col bg-white">
                <nav className="bg-white px-4 md:px-8 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
                    <div className="flex items-center space-x-2 text-primary font-bold text-xl md:text-2xl">
                        <Icons.GraduationCap /><span>{db.name}</span>
                    </div>
                    <button onClick={() => onNavigate('login')} className="bg-primary text-white px-5 md:px-6 py-2 md:py-2.5 rounded-full text-sm md:text-base font-medium hover:bg-indigo-700 shadow transition">Login Portal</button>
                </nav>

                <main className="flex-1">
                    {/* Hero Section */}
                    <div className="px-4 py-16 md:py-24 bg-gradient-to-br from-indigo-50 to-white text-center">
                        <span className="bg-indigo-100 text-primary px-4 py-1 rounded-full text-xs md:text-sm font-bold tracking-wide mb-6 inline-block">Admissions Open 2024</span>
                        <h1 className="text-4xl md:text-6xl lg:text-7xl font-extrabold text-secondary mb-6 leading-tight max-w-5xl mx-auto">
                            Empowering the <br className="hidden md:block"/><span className="text-primary">Leaders of Tomorrow.</span>
                        </h1>
                        <p className="text-base md:text-xl text-gray-500 mb-10 max-w-3xl mx-auto px-4">
                            {db.about}
                        </p>
                        <button onClick={() => onNavigate('login')} className="bg-secondary text-white px-8 md:px-10 py-3.5 md:py-4 rounded-full font-bold hover:bg-gray-900 shadow-xl transition transform hover:-translate-y-1 w-full md:w-auto">
                            Access Digital Campus
                        </button>
                    </div>

                    {/* Stats Section */}
                    <div className="bg-white py-12 md:py-16 border-t border-gray-100">
                        <div className="max-w-5xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                            <div className="p-4"><div className="text-4xl md:text-5xl font-bold text-primary mb-2">{db.stats.students}</div><div className="text-gray-500 font-medium">Enrolled Students</div></div>
                            <div className="p-4"><div className="text-4xl md:text-5xl font-bold text-primary mb-2">{db.stats.teachers}</div><div className="text-gray-500 font-medium">Expert Faculty</div></div>
                            <div className="p-4"><div className="text-4xl md:text-5xl font-bold text-primary mb-2">{db.stats.programs}</div><div className="text-gray-500 font-medium">Academic Programs</div></div>
                        </div>
                    </div>

                    {/* Features Section */}
                    <div className="bg-gray-50 py-16 md:py-24 px-4">
                        <div className="max-w-6xl mx-auto">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-4xl font-bold text-secondary mb-4">A Complete Digital Experience</h2>
                                <p className="text-gray-500 max-w-2xl mx-auto">Everything a student and teacher needs, integrated into one seamless platform.</p>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                                    <div className="w-14 h-14 bg-indigo-100 text-primary rounded-xl flex items-center justify-center mb-6"><Icons.Video /></div>
                                    <h3 className="text-xl font-bold text-secondary mb-3">Live & Recorded Videos</h3>
                                    <p className="text-gray-500 leading-relaxed">Teachers can embed subject-specific YouTube lectures directly into the platform for anytime learning.</p>
                                </div>
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                                    <div className="w-14 h-14 bg-green-100 text-green-600 rounded-xl flex items-center justify-center mb-6"><Icons.ClipboardCheck /></div>
                                    <h3 className="text-xl font-bold text-secondary mb-3">Smart Attendance & SMS</h3>
                                    <p className="text-gray-500 leading-relaxed">Instant attendance tracking. Parents are automatically notified via Email/SMS if a student is absent.</p>
                                </div>
                                <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition">
                                    <div className="w-14 h-14 bg-pink-100 text-pink-600 rounded-xl flex items-center justify-center mb-6"><Icons.FileText /></div>
                                    <h3 className="text-xl font-bold text-secondary mb-3">Leave Management</h3>
                                    <p className="text-gray-500 leading-relaxed">Students can apply for leaves online. Teachers can review, approve, and leave notes digitally.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Demo Info Box */}
                    <div className="max-w-4xl mx-auto px-4 py-16">
                        <div className="bg-gradient-to-r from-primary to-indigo-600 rounded-3xl p-8 md:p-12 text-white shadow-xl text-center md:text-left flex flex-col md:flex-row items-center justify-between gap-8">
                            <div>
                                <h3 className="text-2xl md:text-3xl font-bold mb-2">Try the Prototype Now</h3>
                                <p className="text-indigo-100 mb-6 md:mb-0">Use these demo accounts to explore the platform. Any password will work.</p>
                            </div>
                            <div className="bg-white/10 p-6 rounded-2xl backdrop-blur-sm w-full md:w-auto text-sm">
                                <p className="mb-2"><strong className="text-indigo-200">Teacher:</strong> teacher10@school.com</p>
                                <p><strong className="text-indigo-200">Student:</strong> student10@school.com</p>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        );

        // 2. Login Page
        const LoginPage = ({ onLogin, db }) => {
            const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [error, setError] = useState(''); const [loading, setLoading] = useState(false);
            const handleLogin = (e) => {
                e.preventDefault(); setLoading(true); setError('');
                setTimeout(() => {
                    const userAccount = db.users[email.toLowerCase()];
                    if (userAccount) onLogin(userAccount); else setError(`Account not found. Please use the demo emails.`);
                    setLoading(false);
                }, 600);
            };
            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 fade-in">
                    <div className="glass-card w-full max-w-md p-6 md:p-8 rounded-3xl relative overflow-hidden bg-white shadow-xl">
                        <div className="absolute top-0 left-0 w-full h-2 bg-primary"></div>
                        <div className="flex justify-center mb-6 text-primary cursor-pointer" onClick={() => window.location.reload()}><Icons.GraduationCap /></div>
                        <h2 className="text-2xl font-bold text-center text-secondary mb-2">Secure Login</h2>
                        <p className="text-center text-gray-500 mb-8 text-sm">Sign in to access your dashboard.</p>
                        {error && <div className="mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100 text-center font-medium">{error}</div>}
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition text-sm" placeholder="teacher10@school.com" value={email} onChange={(e) => setEmail(e.target.value)} required /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Password</label><input type="password" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition text-sm" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} required /></div>
                            <button type="submit" disabled={loading} className={`w-full bg-primary text-white py-3.5 rounded-xl font-bold transition shadow-md ${loading ? 'opacity-50 cursor-not-allowed' : 'hover:bg-indigo-700'}`}>{loading ? 'Authenticating...' : 'Sign In'}</button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [db, setDb] = useState(loadDB());
            const [toastMessage, setToastMessage] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const session = localStorage.getItem('activeUser_v5');
                if (session) { setUser(db.users[JSON.parse(session).email]); setView('dashboard'); }
            }, [db]);

            const handleLogin = (userData) => { setUser(userData); localStorage.setItem('activeUser_v5', JSON.stringify(userData)); setActiveTab('home'); setView('dashboard'); window.scrollTo(0,0); };
            const handleLogout = () => { setUser(null); localStorage.removeItem('activeUser_v5'); setView('landing'); window.scrollTo(0,0); };
            const updateDB = (newDB) => { setDb(newDB); saveDB(newDB); };
            const triggerToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 8000); };
            const navClick = (id) => { setActiveTab(id); setMobileMenuOpen(false); window.scrollTo(0,0); };

            // --- STUDENT VIEWS ---
            const StudentHome = () => {
                const myTimetable = db.timetable.filter(t => t.grade === user.grade).sort((a,b) => a.time.localeCompare(b.time));
                const myNotices = db.notices.filter(n => n.targetClass === 'All' || n.targetClass === user.grade);
                const overallPercentage = calculatePercentage(user.marks).toFixed(1);
                return (
                    <div className="space-y-6 fade-in">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between">
                                <div><p className="text-sm text-gray-500 font-medium">My Attendance</p><p className="text-3xl font-extrabold text-green-600">{user.attendance}%</p></div>
                                <div className="p-4 bg-green-50 text-green-500 rounded-full"><Icons.User /></div>
                            </div>
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="flex justify-between items-end mb-2"><p className="text-sm text-gray-500 font-medium">Academic Performance</p><span className="text-xs font-bold bg-indigo-100 text-indigo-700 px-2 py-1 rounded">Overall: {overallPercentage}%</span></div>
                                <div className="flex space-x-4 overflow-x-auto pb-2">
                                    {Object.entries(user.marks || {}).map(([subject, score]) => (
                                        <div key={subject} className="bg-gray-50 px-4 py-2 rounded-lg text-center flex-shrink-0"><p className="text-xs text-gray-400 font-bold uppercase">{subject}</p><p className="text-lg font-bold text-gray-800">{score}/100</p></div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold text-secondary mb-4 flex items-center"><Icons.Calendar /><span className="ml-2">My Timetable ({user.grade})</span></h3>
                                <div className="space-y-3">

                                }).then(function(response) {

                            </form>
                            <div className="space-y-2">
                                {viewingTimetable.length === 0 && <p className="text-center text-gray-400 py-4 text-sm">No slots created for {targetClass}.</p>}
                                {viewingTimetable.map(t => (
                                    <div key={t.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-4 border border-gray-100 rounded-xl bg-white hover:shadow-sm transition gap-4">
                                        <div className="flex items-center space-x-4">
                                            <div className="w-24 text-sm font-bold text-primary bg-indigo-50 py-1 px-2 rounded text-center">{t.time}</div>
                                            <div><p className="font-bold text-gray-800 text-sm">{t.subject}</p><p className="text-xs text-gray-500">Prof: {t.teacher}</p></div>
                                        </div>
                                        <button onClick={()=>handleDelete(t.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition self-end sm:self-auto"><Icons.Trash /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const TeacherNoticesAndVideos = () => {
                const [targetClass, setTargetClass] = useState('All'); const [title, setTitle] = useState(''); const [content, setContent] = useState(''); const [type, setType] = useState('Info');
                const [vidTitle, setVidTitle] = useState(''); const [vidSubject, setVidSubject] = useState(''); const [vidUrl, setVidUrl] = useState(''); const [vidTargetClass, setVidTargetClass] = useState(user.classAssigned);

                const handleAddNotice = (e) => { e.preventDefault(); updateDB({ ...db, notices: [{ id: Date.now(), date: "Just now", title, content, type, targetClass }, ...db.notices] }); setTitle(''); setContent(''); triggerToast("Notice published."); };
                const deleteNotice = (id) => updateDB({ ...db, notices: db.notices.filter(n => n.id !== id) });
                const handleAddVideo = (e) => { e.preventDefault(); const embedUrl = getYoutubeEmbedUrl(vidUrl); if (!embedUrl) return alert("Invalid URL."); updateDB({ ...db, videos: [{ id: Date.now(), title: vidTitle, teacher: user.name, subject: vidSubject, targetClass: vidTargetClass, url: embedUrl }, ...db.videos] }); setVidTitle(''); setVidSubject(''); setVidUrl(''); triggerToast("Video added."); };
                const deleteVideo = (id) => updateDB({ ...db, videos: db.videos.filter(v => v.id !== id) });

                return (
                    <div className="fade-in grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 pb-10">
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-[600px] md:h-[700px]">
                            <h3 className="text-lg font-bold text-secondary mb-4 flex items-center"><Icons.Bell /><span className="ml-2">Notice Publisher</span></h3>
                            <form onSubmit={handleAddNotice} className="bg-gray-50 p-4 rounded-xl mb-6 space-y-3 flex-shrink-0 border border-gray-200">
                                <div className="flex flex-col sm:flex-row gap-2">
                                    <select value={targetClass} onChange={e=>setTargetClass(e.target.value)} className="w-full sm:w-1/3 text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary bg-white"><option value="All">All Classes</option>{db.classes.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                    <select value={type} onChange={e=>setType(e.target.value)} className="w-full sm:w-1/3 text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary bg-white"><option>Info</option><option>Urgent</option></select>
                                    <input type="text" placeholder="Title" value={title} onChange={e=>setTitle(e.target.value)} required className="w-full sm:w-1/3 text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary" />
                                </div>
                                <textarea placeholder="Write notice here..." value={content} onChange={e=>setContent(e.target.value)} required rows="3" className="w-full text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary resize-none"></textarea>
                                <button type="submit" className="w-full bg-primary text-white py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition flex items-center justify-center"><Icons.Plus /><span className="ml-1">Publish</span></button>
                            </form>
                            <div className="overflow-y-auto flex-1 pr-1 space-y-3">
                                {db.notices.map(n => (
                                    <div key={n.id} className="p-4 border border-gray-100 rounded-xl bg-white shadow-sm relative">
                                        <div className="absolute top-3 right-3 flex items-center space-x-2"><span className="text-[9px] bg-gray-100 px-2 py-0.5 rounded text-gray-500 font-bold border">Target: {n.targetClass}</span><button onClick={()=>deleteNotice(n.id)} className="text-red-400 hover:text-red-600"><Icons.Trash /></button></div>
                                        <span className={`text-[9px] font-bold uppercase px-2 py-0.5 rounded-full ${n.type === 'Urgent' ? 'bg-red-100 text-red-700' : 'bg-indigo-100 text-indigo-700'}`}>{n.type}</span>
                                        <h4 className="text-sm font-bold text-gray-800 mt-2 mb-1 pr-20">{n.title}</h4>
                                        <div className="text-xs text-gray-600 line-clamp-3">{n.content}</div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100 flex flex-col h-[600px] md:h-[700px]">
                            <h3 className="text-lg font-bold text-secondary mb-4 flex items-center"><Icons.Video /><span className="ml-2">Video Manager</span></h3>
                            <form onSubmit={handleAddVideo} className="bg-gray-50 p-4 rounded-xl mb-6 space-y-3 flex-shrink-0 border border-gray-200">
                                <div className="flex flex-col sm:flex-row gap-2">
                                    <select value={vidTargetClass} onChange={e=>setVidTargetClass(e.target.value)} className="w-full sm:w-1/3 text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary bg-white">{db.classes.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                    <input type="text" placeholder="Subject" value={vidSubject} onChange={e=>setVidSubject(e.target.value)} required className="w-full sm:w-2/3 text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary" />
                                </div>
                                <input type="text" placeholder="Video Title" value={vidTitle} onChange={e=>setVidTitle(e.target.value)} required className="w-full text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary" />
                                <input type="url" placeholder="YouTube URL Link" value={vidUrl} onChange={e=>setVidUrl(e.target.value)} required className="w-full text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary" />
                                <button type="submit" className="w-full bg-secondary text-white py-2 rounded-lg text-sm font-bold hover:bg-gray-900 transition flex items-center justify-center"><Icons.Plus /><span className="ml-1">Upload</span></button>
                            </form>
                            <div className="overflow-y-auto flex-1 pr-1 space-y-3">
                                {db.videos.map(v => (
                                    <div key={v.id} className="flex items-center justify-between p-3 border border-gray-100 rounded-lg">
                                        <div className="truncate pr-2">
                                            <div className="flex items-center space-x-2 mb-1"><span className="text-[9px] bg-primary/10 text-primary px-2 py-0.5 rounded font-bold">{v.targetClass}</span><p className="text-sm font-bold text-gray-800 truncate">{v.title}</p></div>
                                            <p className="text-xs text-gray-500">{v.subject} • By {v.teacher}</p>
                                        </div>
                                        <button onClick={()=>deleteVideo(v.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition"><Icons.Trash /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const TeacherLeaveApproval = () => {
                const classLeaves = db.leaves.filter(l => l.grade === user.classAssigned).sort((a,b) => new Date(b.date) - new Date(a.date));
                const [noteInput, setNoteInput] = useState({});

                const updateLeaveStatus = (id, newStatus) => {
                    updateDB({ ...db, leaves: db.leaves.map(l => l.id === id ? { ...l, status: newStatus, note: noteInput[id] || l.note } : l) });
                    setNoteInput({...noteInput, [id]: ''}); triggerToast(`Leave ${newStatus}.`);
                };

                return (
                    <div className="fade-in space-y-6">
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="text-lg font-bold text-secondary mb-6 flex items-center"><Icons.FileText /><span className="ml-2">Leave Requests ({user.classAssigned})</span></h3>
                            <div className="space-y-4">
                                {classLeaves.length === 0 && <p className="text-gray-400 text-center py-6">No leave requests pending.</p>}
                                {classLeaves.map(leave => (
                                    <div key={leave.id} className="border border-gray-200 rounded-xl overflow-hidden bg-white shadow-sm">
                                        <div className={`p-4 flex flex-col md:flex-row md:justify-between md:items-center gap-2 border-b ${leave.status === 'Pending' ? 'bg-yellow-50' : 'bg-gray-50'}`}>
                                            <div><h4 className="font-bold text-gray-900">{leave.studentName}</h4><p className="text-xs text-gray-500">Requested for: <span className="font-bold">{new Date(leave.date).toLocaleDateString('en-US', {weekday:'short', month:'long', day:'numeric'})}</span></p></div>
                                            <span className={`text-[10px] w-fit uppercase font-bold px-3 py-1 rounded-full ${leave.status==='Approved'?'bg-green-100 text-green-700':leave.status==='Denied'?'bg-red-100 text-red-700':'bg-yellow-200 text-yellow-800'}`}>{leave.status}</span>
                                        </div>
                                        <div className="p-4">
                                            <p className="text-sm text-gray-700 mb-4"><strong>Reason:</strong> {leave.reason}</p>
                                            {leave.status === 'Pending' ? (
                                                <div className="space-y-3">
                                                    <input type="text" placeholder="Add note (optional)" value={noteInput[leave.id] || ''} onChange={e=>setNoteInput({...noteInput, [leave.id]: e.target.value})} className="w-full text-sm px-3 py-2 border border-gray-200 rounded outline-none focus:border-primary bg-gray-50" />
                                                    <div className="flex space-x-3"><button onClick={()=>updateLeaveStatus(leave.id, 'Approved')} className="flex-1 bg-green-500 text-white py-2 rounded font-bold hover:bg-green-600 transition text-sm">Approve</button><button onClick={()=>updateLeaveStatus(leave.id, 'Denied')} className="flex-1 bg-red-500 text-white py-2 rounded font-bold hover:bg-red-600 transition text-sm">Deny</button></div>
                                                </div>
                                            ) : (
                                                <div>{leave.note && <p className="text-xs text-gray-500 italic bg-gray-50 p-2 rounded"><strong>Note:</strong> {leave.note}</p>}<button onClick={()=>updateLeaveStatus(leave.id, 'Pending')} className="mt-3 text-xs text-indigo-500 font-bold hover:underline">Re-evaluate Request</button></div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            // --- Layout Rendering ---
            if (view === 'landing') return <LandingPage onNavigate={setView} db={db} />;
            if (view === 'login') return <LoginPage onLogin={handleLogin} db={db} />;
            
            const navItems = user?.role === 'student' 
                ? [ { id: 'home', label: 'My Dashboard', icon: <Icons.Calendar /> }, { id: 'videos', label: 'My Class Videos', icon: <Icons.Video /> }, { id: 'leave', label: 'Leave Requests', icon: <Icons.FileText /> } ]
                : [ { id: 'home', label: 'Roster & Grades', icon: <Icons.Users /> }, { id: 'attendance', label: 'Live Attendance', icon: <Icons.ClipboardCheck /> }, { id: 'leaves', label: 'Leave Approvals', icon: <Icons.FileText /> }, { id: 'timetable', label: 'Timetable Manager', icon: <Icons.Calendar /> }, { id: 'content', label: 'Notices & Videos', icon: <Icons.BookOpen /> } ];

            return (
                <div className="min-h-screen bg-background flex flex-col md:flex-row relative">
                    {toastMessage && <Toast message={toastMessage} onClose={() => setToastMessage(null)} />}
                    
                    {/* Mobile Header */}
                    <div className="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center space-x-2 text-primary font-bold"><Icons.GraduationCap /> <span className="truncate">{db.name}</span></div>
                        <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="text-gray-600"><Icons.Menu /></button>
                    </div>

                    {/* Mobile Menu Overlay */}
                    {mobileMenuOpen && <div className="md:hidden fixed inset-0 bg-black/50 z-40 backdrop-blur-sm" onClick={()=>setMobileMenuOpen(false)}></div>}

                    {/* Sidebar */}
                    <aside className={`w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full z-50 shadow-2xl md:shadow-sm transition-transform duration-300 ease-in-out ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-6 hidden md:flex items-center space-x-2 text-primary font-bold text-xl border-b border-gray-50"><Icons.GraduationCap /> <span className="truncate">{db.name}</span></div>
                        <div className="p-6 flex items-center space-x-3 bg-gray-50/50 border-b md:border-0 border-gray-100">
                            <div className="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-primary font-bold shadow-inner">{user.name.charAt(0)}</div>
                            <div className="overflow-hidden"><div className="font-bold text-gray-800 text-sm truncate">{user.name}</div><div className="text-xs text-primary font-medium uppercase tracking-wider">{user.role}</div></div>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => navClick(item.id)} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-bold transition ${activeTab === item.id ? 'bg-primary text-white shadow-md' : 'text-gray-500 hover:bg-indigo-50 hover:text-primary'}`}>
                                    {item.icon} <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 mt-auto border-t border-gray-100"><button onClick={handleLogout} className="w-full flex items-center justify-center space-x-2 px-4 py-3 rounded-xl text-sm font-bold text-red-500 bg-red-50 hover:bg-red-100 transition"><Icons.LogOut /> <span>Secure Logout</span></button></div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 md:ml-64 p-4 md:p-8 overflow-y-auto">
                        <div className="hidden md:flex justify-between items-center mb-8">
                            <div><h1 className="text-3xl font-extrabold text-secondary capitalize">{activeTab.replace('-', ' ')}</h1><p className="text-gray-500 text-sm mt-1">{new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p></div>
                        </div>
                        
                        {user?.role === 'student' && activeTab === 'home' && <StudentHome />}
                        {user?.role === 'student' && activeTab === 'videos' && <StudentVideos />}
                        {user?.role === 'student' && activeTab === 'leave' && <StudentLeaveManagement />}
                        
                        {user?.role === 'teacher' && activeTab === 'home' && <TeacherHome />}
                        {user?.role === 'teacher' && activeTab === 'attendance' && <TeacherAttendance />}
                        {user?.role === 'teacher' && activeTab === 'leaves' && <TeacherLeaveApproval />}
                        {user?.role === 'teacher' && activeTab === 'timetable' && <TeacherTimetable />}
                        {user?.role === 'teacher' && activeTab === 'content' && <TeacherNoticesAndVideos />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
