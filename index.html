<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global EdTech | Premium Campus Platform</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel to compile JSX -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#4f46e5', secondary: '#1e293b', accent: '#ec4899', background: '#f8fafc' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icons = {
            GraduationCap: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Video: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Bell: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Activity: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        };

        // --- LOCAL DATABASE SETUP (Auto-Syncing) ---
        const DEFAULT_DATA = {
            name: "Apex Global Academy",
            users: {
                "admin@school.com": { name: "Principal Carter", role: "admin" },
                "student@school.com": { name: "John Student", role: "student", grade: "10th" },
                "parent@school.com": { name: "Sarah Parent", role: "student", grade: "12th" }
            },
            timetable: [
                { time: "09:00 AM", subject: "Advanced Mathematics", teacher: "Prof. Jenkins" },
                { time: "10:30 AM", subject: "Physics (Theory)", teacher: "Dr. Grant" },
                { time: "12:00 PM", subject: "Lunch Break", teacher: "-" },
                { time: "01:00 PM", subject: "Computer Science", teacher: "Mr. Chen" }
            ],
            notices: [
                { id: 1, date: "Today", title: "Welcome to the new digital platform!", type: "Info" }
            ],
            videos: [
                { id: 1, title: "Newton's Laws Explained", teacher: "Dr. Grant", subject: "Physics", url: "https://www.youtube.com/embed/p_o4aY7vkXg" }
            ]
        };

        // Load data from browser storage, or use defaults if first time
        const loadDB = () => {
            const saved = localStorage.getItem('GlobalEdTechDB');
            if (saved) return JSON.parse(saved);
            localStorage.setItem('GlobalEdTechDB', JSON.stringify(DEFAULT_DATA));
            return DEFAULT_DATA;
        };

        const saveDB = (newData) => {
            localStorage.setItem('GlobalEdTechDB', JSON.stringify(newData));
        };

        const getYoutubeEmbedUrl = (url) => {
            if (!url) return '';
            let videoId = '';
            try {
                if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
                else if (url.includes('watch?v=')) videoId = url.split('watch?v=')[1].split('&')[0];
                else if (url.includes('embed/')) return url;
            } catch (e) { return null; }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        };


        // --- COMPONENTS ---

        const LandingPage = ({ onNavigate, db }) => (
            <div className="min-h-screen flex flex-col fade-in bg-white">
                <nav className="bg-white px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
                    <div className="flex items-center space-x-2 text-primary font-bold text-2xl">
                        <Icons.GraduationCap />
                        <span>{db.name}</span>
                    </div>
                    <button onClick={() => onNavigate('login')} className="bg-primary text-white px-6 py-2.5 rounded-full font-medium hover:bg-indigo-700 shadow transition">Login Portal</button>
                </nav>

                <div className="flex-1 flex flex-col items-center justify-center text-center px-4 py-20 bg-gradient-to-br from-indigo-50 to-white">
                    <h1 className="text-5xl md:text-7xl font-extrabold text-secondary mb-6 leading-tight max-w-4xl">
                        Smart Education, <br/><span className="text-primary">Anywhere.</span>
                    </h1>
                    <p className="text-lg md:text-xl text-gray-500 mb-10 max-w-2xl">
                        Access course materials, watch live video lectures, and stay updated with instant campus notices securely using your verified school email.
                    </p>
                    <div className="flex flex-col sm:flex-row gap-4">
                        <button onClick={() => onNavigate('login')} className="bg-secondary text-white px-8 py-4 rounded-full font-bold hover:bg-gray-900 shadow-xl transition transform hover:-translate-y-1">
                            Secure Campus Login
                        </button>
                    </div>

                    <div className="mt-16 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-left max-w-md w-full">
                        <p className="text-sm text-gray-500 font-bold mb-3 uppercase tracking-wider">Prototype Demo Accounts</p>
                        <div className="space-y-2 text-sm">
                            <p><strong>Admin:</strong> admin@school.com</p>
                            <p><strong>Student:</strong> student@school.com</p>
                            <p className="text-xs text-gray-400 mt-2 italic">(Any password will work for the demo)</p>
                        </div>
                    </div>
                </div>
            </div>
        );

        const LoginPage = ({ onLogin, db }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                
                // Simulate network delay for realism
                setTimeout(() => {
                    const userAccount = db.users[email.toLowerCase()];
                    if (userAccount) {
                        onLogin({ ...userAccount, email: email });
                    } else {
                        setError(`Account not found. Please use the demo emails provided on the home page.`);
                    }
                    setLoading(false);
                }, 800);
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 fade-in">
                    <div className="glass-card w-full max-w-md p-8 rounded-3xl relative overflow-hidden bg-white shadow-xl">
                        <div className="absolute top-0 left-0 w-full h-2 bg-primary"></div>
                        
                        <div className="flex justify-center mb-6 text-primary cursor-pointer" onClick={() => window.location.reload()}>
                            <Icons.GraduationCap />
                        </div>
                        
                        <h2 className="text-2xl font-bold text-center text-secondary mb-2">Secure Login</h2>
                        <p className="text-center text-gray-500 mb-8 text-sm">Sign in to access your campus dashboard.</p>

                        {error && (
                            <div className="mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100 text-center font-medium">
                                {error}
                            </div>
                        )}

                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Registered Email</label>
                                <input 
                                    type="email" 
                                    className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition text-sm"
                                    placeholder="e.g. admin@school.com"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                <input 
                                    type="password" 
                                    className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition text-sm"
                                    placeholder="••••••••"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                />
                            </div>
                            <button 
                                type="submit"
                                disabled={loading} 
                                className={`w-full bg-primary text-white py-3.5 rounded-xl font-bold transition shadow-md ${loading ? 'opacity-50 cursor-not-allowed' : 'hover:bg-indigo-700'}`}
                            >
                                {loading ? 'Authenticating...' : 'Sign In'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // --- DASHBOARD LAYOUT & VIEWS ---

        const App = () => {
            const [view, setView] = useState('landing');
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            
            // Database State
            const [db, setDb] = useState(loadDB());
            const [pulseStats, setPulseStats] = useState({ happy: 45, neutral: 12, stressed: 8 });

            // Check session on load
            useEffect(() => {
                const session = localStorage.getItem('activeUser');
                if (session) {
                    setUser(JSON.parse(session));
                    setView('dashboard');
                }
            }, []);

            const handleLogin = (userData) => {
                setUser(userData);
                localStorage.setItem('activeUser', JSON.stringify(userData));
                setActiveTab('home');
                setView('dashboard');
                window.scrollTo(0,0);
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('activeUser');
                setView('landing');
                window.scrollTo(0,0);
            };

            // Database Actions (Updates state AND LocalStorage so it persists)
            const updateDB = (newDB) => {
                setDb(newDB);
                saveDB(newDB);
            };

            const addNotice = (title, type) => {
                const newDB = { ...db, notices: [{ id: Date.now(), date: "Just now", title, type }, ...db.notices] };
                updateDB(newDB);
            };
            const deleteNotice = (id) => {
                const newDB = { ...db, notices: db.notices.filter(n => n.id !== id) };
                updateDB(newDB);
            };

            const addVideo = (title, teacher, subject, rawUrl) => {
                const embedUrl = getYoutubeEmbedUrl(rawUrl);
                if (!embedUrl) return alert("Invalid YouTube URL. Please use a standard YouTube link.");
                const newDB = { ...db, videos: [{ id: Date.now(), title, teacher, subject, url: embedUrl }, ...db.videos] };
                updateDB(newDB);
            };
            const deleteVideo = (id) => {
                const newDB = { ...db, videos: db.videos.filter(v => v.id !== id) };
                updateDB(newDB);
            };


            const StudentHome = () => {
                const [voted, setVoted] = useState(false);
                const handlePulseVote = (type) => {
                    if(voted) return;
                    setPulseStats(prev => ({...prev, [type]: prev[type] + 1}));
                    setVoted(true);
                }
                return (
                    <div className="space-y-6 fade-in">
                        <div className="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl p-6 text-white shadow-md flex flex-col md:flex-row items-center justify-between">
                            <div>
                                <h3 className="text-xl font-bold flex items-center"><Icons.Activity /> <span className="ml-2">Campus Pulse Check</span></h3>
                                <p className="text-blue-100 text-sm mt-1">How are you feeling about your learning today?</p>
                            </div>
                            <div className="flex space-x-3 mt-4 md:mt-0">
                                <button onClick={()=>handlePulseVote('happy')} className={`text-3xl hover:scale-110 transition ${voted?'opacity-50 cursor-not-allowed':''}`}>😊</button>
                                <button onClick={()=>handlePulseVote('neutral')} className={`text-3xl hover:scale-110 transition ${voted?'opacity-50 cursor-not-allowed':''}`}>😐</button>
                                <button onClick={()=>handlePulseVote('stressed')} className={`text-3xl hover:scale-110 transition ${voted?'opacity-50 cursor-not-allowed':''}`}>😫</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 h-96 overflow-y-auto">
                                <h3 className="text-lg font-bold text-secondary mb-4 flex items-center sticky top-0 bg-white pb-2"><Icons.Bell /><span className="ml-2">Live Notices</span></h3>
                                <div className="space-y-3">
                                    {db.notices.length === 0 ? <p className="text-sm text-gray-400">No active notices.</p> : null}
                                    {db.notices.map(notice => (
                                        <div key={notice.id} className="p-4 bg-gray-50 rounded-xl border-l-4 border-primary">
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full">{notice.type}</span>
                                                <span className="text-xs text-gray-400">{notice.date}</span>
                                            </div>
                                            <p className="text-sm font-semibold text-gray-800 mt-2">{notice.title}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white rounded-2xl p-6 shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold text-secondary mb-4 flex items-center"><Icons.Calendar /><span className="ml-2">Today's Schedule</span></h3>
                                <div className="space-y-3">
                                    {db.timetable.map((cls, idx) => (
                                        <div key={idx} className="flex items-center p-3 rounded-lg hover:bg-gray-50 transition border border-transparent hover:border-gray-100">
                                            <div className="w-20 text-xs font-bold text-primary">{cls.time}</div>
                                            <div className="flex-1">
                                                <div className="font-semibold text-gray-800 text-sm">{cls.subject}</div>
                                                <div className="text-xs text-gray-500">{cls.teacher}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            const StudentVideos = () => (
                <div className="fade-in space-y-6">
                    <h3 className="text-xl font-bold text-secondary border-b pb-2">Class Lectures</h3>
                    {db.videos.length === 0 ? (
                        <div className="text-center py-10 text-gray-400 bg-white rounded-xl shadow-sm border border-gray-100">No videos uploaded yet.</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {db.videos.map(video => (
                                <div key={video.id} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100">
                                    <div className="aspect-video bg-black relative">
                                        <iframe src={video.url} className="absolute top-0 left-0 w-full h-full" frameBorder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowFullScreen></iframe>
                                    </div>
                                    <div className="p-4">
                                        <span className="text-[10px] font-bold uppercase tracking-wider text-primary mb-1 block">{video.subject}</span>
                                        <h4 className="font-bold text-gray-800 mb-1">{video.title}</h4>
                                        <p className="text-xs text-gray-500">By {video.teacher}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );

            const AdminDashboard = () => {
                const [newVidUrl, setNewVidUrl] = useState('');
                const [newVidTitle, setNewVidTitle] = useState('');
                const [newVidSubject, setNewVidSubject] = useState('');
                const [newNotice, setNewNotice] = useState('');
                const [noticeType, setNoticeType] = useState('Info');

                const handleAddVideo = (e) => { e.preventDefault(); addVideo(newVidTitle, user.name, newVidSubject, newVidUrl); setNewVidUrl(''); setNewVidTitle(''); setNewVidSubject(''); };
                const handleAddNotice = (e) => { e.preventDefault(); addNotice(newNotice, noticeType); setNewNotice(''); }

                return (
                    <div className="fade-in space-y-8 pb-10">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center">
                                <div><p className="text-sm text-gray-500">Total Users</p><p className="text-2xl font-bold">1,204</p></div>
                                <div className="p-3 bg-blue-50 text-blue-500 rounded-lg"><Icons.User /></div>
                            </div>
                            <div className="bg-white p-5 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center">
                                <div><p className="text-sm text-gray-500">Active Videos</p><p className="text-2xl font-bold">{db.videos.length}</p></div>
                                <div className="p-3 bg-red-50 text-red-500 rounded-lg"><Icons.Video /></div>
                            </div>
                            <div className="bg-gradient-to-br from-indigo-500 to-primary p-5 rounded-xl shadow-sm text-white">
                                <p className="text-sm text-indigo-100 mb-1">Campus Pulse (Today)</p>
                                <div className="flex justify-between text-sm">
                                    <span>😊 {pulseStats.happy}</span><span>😐 {pulseStats.neutral}</span><span>😫 {pulseStats.stressed}</span>
                                </div>
                                <div className="w-full bg-indigo-900/50 h-1.5 mt-2 rounded-full overflow-hidden flex">
                                    <div style={{width: `${(pulseStats.happy/(pulseStats.happy+pulseStats.neutral+pulseStats.stressed))*100}%`}} className="bg-green-400 h-full"></div>
                                    <div style={{width: `${(pulseStats.neutral/(pulseStats.happy+pulseStats.neutral+pulseStats.stressed))*100}%`}} className="bg-yellow-400 h-full"></div>
                                    <div style={{width: `${(pulseStats.stressed/(pulseStats.happy+pulseStats.neutral+pulseStats.stressed))*100}%`}} className="bg-red-400 h-full"></div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-8">
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold text-secondary mb-4 flex items-center"><Icons.Video /><span className="ml-2">Manage Videos</span></h3>
                                <form onSubmit={handleAddVideo} className="bg-gray-50 p-4 rounded-xl mb-6 space-y-3">
                                    <input type="text" placeholder="Video Title" value={newVidTitle} onChange={e=>setNewVidTitle(e.target.value)} required className="w-full text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary" />
                                    <div className="flex space-x-2">
                                        <input type="text" placeholder="Subject" value={newVidSubject} onChange={e=>setNewVidSubject(e.target.value)} required className="w-1/3 text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary" />
                                        <input type="url" placeholder="YouTube URL" value={newVidUrl} onChange={e=>setNewVidUrl(e.target.value)} required className="w-2/3 text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary" />
                                    </div>
                                    <button type="submit" className="w-full bg-secondary text-white py-2 rounded-lg text-sm font-bold hover:bg-gray-900 transition flex items-center justify-center"><Icons.Plus /><span className="ml-1">Embed Video</span></button>
                                </form>
                                <div className="space-y-3 max-h-64 overflow-y-auto pr-2">
                                    {db.videos.map(v => (
                                        <div key={v.id} className="flex items-center justify-between p-3 border border-gray-100 rounded-lg">
                                            <div className="truncate pr-4"><p className="text-sm font-bold text-gray-800 truncate">{v.title}</p><p className="text-xs text-gray-500">{v.subject}</p></div>
                                            <button onClick={()=>deleteVideo(v.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition"><Icons.Trash /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                                <h3 className="text-lg font-bold text-secondary mb-4 flex items-center"><Icons.Bell /><span className="ml-2">Manage Notices</span></h3>
                                <form onSubmit={handleAddNotice} className="bg-gray-50 p-4 rounded-xl mb-6 space-y-3">
                                    <div className="flex space-x-2">
                                        <select value={noticeType} onChange={e=>setNoticeType(e.target.value)} className="w-1/3 text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary bg-white">
                                            <option>Info</option><option>Urgent</option><option>Holiday</option>
                                        </select>
                                        <input type="text" placeholder="Notice Title/Message" value={newNotice} onChange={e=>setNewNotice(e.target.value)} required className="w-2/3 text-sm px-3 py-2 rounded-lg border outline-none focus:border-primary" />
                                    </div>
                                    <button type="submit" className="w-full bg-primary text-white py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition flex items-center justify-center"><Icons.Plus /><span className="ml-1">Publish Notice</span></button>
                                </form>
                                <div className="space-y-3 max-h-64 overflow-y-auto pr-2">
                                    {db.notices.map(n => (
                                        <div key={n.id} className="flex items-center justify-between p-3 border border-gray-100 rounded-lg">
                                            <div className="truncate pr-4"><p className="text-sm font-bold text-gray-800 truncate">{n.title}</p><span className="text-[10px] uppercase bg-gray-100 px-2 py-0.5 rounded text-gray-600">{n.type}</span></div>
                                            <button onClick={()=>deleteNotice(n.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition"><Icons.Trash /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            if (view === 'landing') return <LandingPage onNavigate={setView} db={db} />;
            if (view === 'login') return <LoginPage onLogin={handleLogin} db={db} />;
            
            const navItems = user?.role === 'student' 
                ? [ { id: 'home', label: 'Dashboard', icon: <Icons.Calendar /> }, { id: 'videos', label: 'Live Videos', icon: <Icons.Video /> } ]
                : [ { id: 'home', label: 'Control Center', icon: <Icons.Settings /> } ];

            return (
                <div className="min-h-screen bg-background flex flex-col md:flex-row">
                    <aside className="w-full md:w-64 bg-white border-r border-gray-200 flex flex-col md:fixed md:h-full z-10 shadow-sm">
                        <div className="p-6 flex items-center space-x-2 text-primary font-bold text-xl border-b border-gray-50">
                            <Icons.GraduationCap /> <span className="truncate">{db.name}</span>
                        </div>
                        <div className="p-6 flex items-center space-x-3 bg-gray-50/50">
                            <div className="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-primary font-bold shadow-inner">{user.name.charAt(0)}</div>
                            <div className="overflow-hidden">
                                <div className="font-bold text-gray-800 text-sm truncate">{user.name}</div>
                                <div className="text-xs text-primary font-medium uppercase tracking-wider">{user.role}</div>
                            </div>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2 flex md:flex-col overflow-x-auto md:overflow-visible border-y md:border-y-0 border-gray-100">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex-shrink-0 md:w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-bold transition ${activeTab === item.id ? 'bg-primary text-white shadow-md' : 'text-gray-500 hover:bg-indigo-50 hover:text-primary'}`}>
                                    {item.icon} <span className="md:inline">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 md:mt-auto hidden md:block">
                            <button onClick={handleLogout} className="w-full flex items-center justify-center space-x-2 px-4 py-3 rounded-xl text-sm font-bold text-red-500 bg-red-50 hover:bg-red-100 transition">
                                <Icons.LogOut /> <span>Secure Logout</span>
                            </button>
                        </div>
                    </aside>
                    <main className="flex-1 md:ml-64 p-4 md:p-8 overflow-y-auto">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-3xl font-extrabold text-secondary capitalize">{activeTab}</h1>
                                <p className="text-gray-500 text-sm mt-1">{new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                            </div>
                            <button onClick={handleLogout} className="md:hidden p-2 rounded-full bg-red-50 text-red-500 shadow-sm"><Icons.LogOut /></button>
                        </div>
                        {user?.role === 'student' && activeTab === 'home' && <StudentHome />}
                        {user?.role === 'student' && activeTab === 'videos' && <StudentVideos />}
                        {user?.role === 'admin' && activeTab === 'home' && <AdminDashboard />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
