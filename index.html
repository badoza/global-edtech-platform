<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global EdTech | Smart Campus</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel to compile JSX -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#4f46e5', secondary: '#1e293b', accent: '#ec4899', background: '#f8fafc' },
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 6px; height: 6px;}
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .toggle-checkbox:checked { right: 0; border-color: #4f46e5; }
        .toggle-checkbox:checked + .toggle-label { background-color: #4f46e5; }
        .toggle-checkbox:checked + .toggle-label:before { transform: translateX(100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icons = {
            GraduationCap: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Video: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Bell: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Users: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            Edit: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>,
            FileText: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
            ClipboardCheck: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><polyline points="9 14 11 16 15 11"></polyline></svg>,
            XCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>,
            Eye: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>,
            Menu: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>,
            Chart: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>,
            Shield: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>,
            Toggle: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="5" width="22" height="14" rx="7" ry="7"></rect><circle cx="16" cy="12" r="3"></circle></svg>
        };

        const EXAMS = ["Unit Test 1", "Unit Test 2", "Unit Test 3", "Half Semester", "Unit Test 4", "Unit Test 5", "Final Semester"];
        const todayStr = new Date().toISOString().split('T')[0];

        // --- DATABASE v7 (Complete Ecosystem) ---
        const DEFAULT_DATA = {
            name: "Apex Global Academy",
            about: "A premier institution dedicated to academic excellence, holistic development, and modern learning methodologies since 1995.",
            stats: { students: "2,500+", teachers: "150+", programs: "40+" },
            classes: ["1st Standard", "2nd Standard", "9th Standard", "10th Standard"],
            settings: { enableVideos: true, enableLeaves: true, enableNotices: true },
            users: {
                "admin@school.com": { email: "admin@school.com", name: "Principal Carter", role: "admin", status: "active" },
                "teacher10@school.com": { email: "teacher10@school.com", name: "Mrs. Smith", role: "teacher", isClassTeacher: true, classAssigned: "10th Standard", status: "active" },
                "subteacher@school.com": { email: "subteacher@school.com", name: "Mr. Roberts", role: "teacher", isClassTeacher: false, classAssigned: "10th Standard", status: "active" },
                "student10@school.com": { email: "student10@school.com", name: "John Student", role: "student", grade: "10th Standard", attendance: 92, parentName: "Robert Student", parentPhone: "+1-555-0102", parentEmail: "robert@family.com", status: "active", marks: { "Unit Test 1": { Math: 85, Science: 90 }, "Unit Test 2": { Math: 88, Science: 92 } } },
                "student1@school.com": { email: "student1@school.com", name: "Little Timmy", role: "student", grade: "1st Standard", attendance: 98, parentName: "Sarah Parent", parentPhone: "+1-555-0100", parentEmail: "sarah@family.com", status: "active", marks: { "Unit Test 1": { Math: 95, Art: 99 } } }
            },
            timetable: [
                { id: 1, grade: "10th Standard", time: "09:00 AM", subject: "Advanced Math", teacher: "Mrs. Smith" },
                { id: 2, grade: "10th Standard", time: "10:30 AM", subject: "Physics", teacher: "Mr. Roberts" }
            ],
            notices: [
                { id: 1, date: "Today", title: "Welcome to the New Semester", content: "We are thrilled to welcome you back.", type: "Info", targetClass: "All", targetUser: null }
            ],
            videos: [
                { id: 1, title: "Calculus Fundamentals", teacher: "Mrs. Smith", subject: "Math", targetClass: "10th Standard", url: "https://www.youtube.com/embed/p_o4aY7vkXg" }
            ],
            leaves: [
                { id: 1, studentEmail: "student10@school.com", studentName: "John Student", grade: "10th Standard", date: todayStr, reason: "Family event.", status: "Pending", note: "" }
            ]
        };

        const loadDB = () => {
            const saved = localStorage.getItem('EdTechData_v7');
            if (saved) return JSON.parse(saved);
            localStorage.setItem('EdTechData_v7', JSON.stringify(DEFAULT_DATA));
            return DEFAULT_DATA;
        };
        const saveDB = (newData) => localStorage.setItem('EdTechData_v7', JSON.stringify(newData));

        const getYoutubeEmbedUrl = (url) => {
            if (!url) return ''; let videoId = '';
            try {
                if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1].split('?')[0];
                else if (url.includes('watch?v=')) videoId = url.split('watch?v=')[1].split('&')[0];
                else if (url.includes('embed/')) return url;
            } catch (e) { return null; }
            return videoId ? `https://www.youtube.com/embed/${videoId}` : null;
        };

        const calculatePercentage = (examMarks) => {
            if (!examMarks) return 0; const subjects = Object.values(examMarks);
            if (subjects.length === 0) return 0;
            const total = subjects.reduce((sum, mark) => sum + parseInt(mark || 0), 0);
            return (total / (subjects.length * 100)) * 100;
        };

        // --- CUSTOM TOAST NOTIFICATION ---
        const Toast = ({ message, onClose }) => (
            <div className="fixed bottom-4 right-4 md:bottom-8 md:right-8 bg-gray-900 text-white p-4 rounded-xl shadow-2xl z-[100] flex items-start space-x-3 fade-in max-w-sm md:max-w-md border-l-4 border-green-400">
                <div className="mt-0.5 text-green-400"><Icons.Bell /></div>
                <div className="flex-1"><h4 className="font-bold text-sm mb-1">System Action</h4><p className="text-xs text-gray-300 whitespace-pre-wrap">{message}</p></div>
                <button onClick={onClose} className="text-gray-400 hover:text-white"><Icons.XCircle /></button>
            </div>
        );

        // --- COMPONENTS ---

        // 1. Enhanced Landing Page
        const LandingPage = ({ onNavigate, db }) => (
            <div className="min-h-screen flex flex-col bg-white">
                <nav className="bg-white px-4 md:px-8 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
                    <div className="flex items-center space-x-2 text-primary font-bold text-xl md:text-2xl"><Icons.GraduationCap /><span>{db.name}</span></div>
                    <button onClick={() => onNavigate('login')} className="bg-primary text-white px-5 md:px-6 py-2 md:py-2.5 rounded-full text-sm md:text-base font-medium hover:bg-indigo-700 shadow transition">Login Portal</button>
                </nav>

                <main className="flex-1">
                    <div className="px-4 py-16 md:py-24 bg-gradient-to-br from-indigo-50 to-white text-center">
                        <span className="bg-indigo-100 text-primary px-4 py-1 rounded-full text-xs md:text-sm font-bold tracking-wide mb-6 inline-block">Enterprise EdTech Platform</span>
                        <h1 className="text-4xl md:text-6xl lg:text-7xl font-extrabold text-secondary mb-6 leading-tight max-w-5xl mx-auto">
                            Empowering the <br className="hidden md:block"/><span className="text-primary">Leaders of Tomorrow.</span>
                        </h1>
                        <p className="text-base md:text-xl text-gray-500 mb-10 max-w-3xl mx-auto px-4">{db.about}</p>
                        <button onClick={() => onNavigate('login')} className="bg-secondary text-white px-8 md:px-10 py-3.5 md:py-4 rounded-full font-bold hover:bg-gray-900 shadow-xl transition transform hover:-translate-y-1 w-full md:w-auto">
                            Access Digital Campus
                        </button>
                    </div>

                    <div className="max-w-6xl mx-auto px-4 py-16">
                        <div className="bg-white p-6 md:p-10 rounded-3xl shadow-xl border border-gray-100 text-left w-full relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-32 h-32 bg-indigo-50 rounded-bl-full -z-10"></div>
                            <h3 className="text-2xl font-bold mb-6 flex items-center"><Icons.Shield /><span className="ml-2">ERP Role Demonstrations</span></h3>
                            <p className="text-gray-500 mb-8 max-w-2xl">Log in with the emails below (use any password) to see how the system dynamically adjusts permissions and data access based on user roles.</p>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 text-sm">
                                <div className="bg-purple-50 p-5 rounded-2xl border border-purple-100"><p className="font-bold text-purple-800 mb-1 flex items-center">👨‍💼 Principal / Admin</p><p className="font-mono text-purple-600 mb-2">admin@school.com</p><p className="text-xs text-purple-700">Full dashboard stats, deep dive filters, manage teachers, app settings.</p></div>
                                <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100"><p className="font-bold text-blue-800 mb-1 flex items-center">👩‍🏫 Class Teacher (10th)</p><p className="font-mono text-blue-600 mb-2">teacher10@school.com</p><p className="text-xs text-blue-700">Manage 10th timetable, approve leaves, add students, grade exams.</p></div>
                                <div className="bg-cyan-50 p-5 rounded-2xl border border-cyan-100"><p className="font-bold text-cyan-800 mb-1 flex items-center">👨‍🏫 Subject Teacher</p><p className="font-mono text-cyan-600 mb-2">subteacher@school.com</p><p className="text-xs text-cyan-700">Restricted view: Only attendance tracking and exam grading.</p></div>
                                <div className="bg-green-50 p-5 rounded-2xl border border-green-100"><p className="font-bold text-green-800 mb-1 flex items-center">🎓 Student (10th)</p><p className="font-mono text-green-600 mb-2">student10@school.com</p><p className="text-xs text-green-700">Track multi-exam performance, apply for leaves, watch assigned videos.</p></div>
                            </div>
                        </div>
                    </div>
                </main>
            </div>
        );

        // 2. Login Page
        const LoginPage = ({ onLogin, db }) => {
            const [email, setEmail] = useState(''); const [password, setPassword] = useState(''); const [error, setError] = useState(''); const [loading, setLoading] = useState(false);
            const handleLogin = (e) => {
                e.preventDefault(); setLoading(true); setError('');
                setTimeout(() => {
                    const userAccount = db.users[email.toLowerCase()];
                    if (userAccount) {
                        if(userAccount.status === 'blocked') setError("This account has been blocked by Administration.");
                        else onLogin(userAccount);
                    } else setError(`Account not found. Please check demo emails.`);
                    setLoading(false);
                }, 600);
            };
            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 fade-in">
                    <div className="glass-card w-full max-w-md p-6 md:p-8 rounded-3xl relative overflow-hidden bg-white shadow-xl">
                        <div className="absolute top-0 left-0 w-full h-2 bg-primary"></div>
                        <div className="flex justify-center mb-6 text-primary cursor-pointer" onClick={() => window.location.reload()}><Icons.GraduationCap /></div>
                        <h2 className="text-2xl font-bold text-center text-secondary mb-2">System Login</h2>
                        <p className="text-center text-gray-500 mb-8 text-sm">Enter portal credentials.</p>
                        {error && <div className="mb-6 p-4 bg-red-50 text-red-600 text-sm rounded-xl border border-red-100 text-center font-medium">{error}</div>}
                        <form onSubmit={handleLogin} className="space-y-5">
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition text-sm" placeholder="admin@school.com" value={email} onChange={(e) => setEmail(e.target.value)} required /></div>
                            <div><label className="block text-sm font-medium text-gray-700 mb-1">Password</label><input type="password" className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition text-sm" placeholder="••••••••" value={password} onChange={(e) => setPassword(e.target.value)} required /></div>
                            <button type="submit" disabled={loading} className={`w-full bg-primary text-white py-3.5 rounded-xl font-bold transition shadow-md ${loading ? 'opacity-50 cursor-not-allowed' : 'hover:bg-indigo-700'}`}>{loading ? 'Authenticating...' : 'Sign In'}</button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('landing');
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [db, setDb] = useState(loadDB());
            const [toastMessage, setToastMessage] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            useEffect(() => {
                const session = localStorage.getItem('activeUser_v6');
                if (session) { 
                    const sessionUser = db.users[JSON.parse(session).email];
                    if(sessionUser && sessionUser.status !== 'blocked') { setUser(sessionUser); setView('dashboard'); }
                    else handleLogout();
                }
            }, [db]);

            const handleLogin = (userData) => { setUser(userData); localStorage.setItem('activeUser_v6', JSON.stringify(userData)); setActiveTab('home'); setView('dashboard'); window.scrollTo(0,0); };
            const handleLogout = () => { setUser(null); localStorage.removeItem('activeUser_v6'); setView('landing'); window.scrollTo(0,0); };
            const updateDB = (newDB) => { setDb(newDB); saveDB(newDB); };
            const triggerToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 5000); };
            const navClick = (id) => { setActiveTab(id); setMobileMenuOpen(false); window.scrollTo(0,0); };

            // --- STUDENT VIEWS ---
            const StudentHome = () => {
                const [selectedExam, setSelectedExam] = useState(EXAMS[0]);
                const myTimetable = db.timetable.filter(t => t.grade === user.grade).sort((a,b) => a.time.localeCompare(b.time));
                const myNotices = db.notices.filter(n => (n.targetClass === 'All' || n.targetClass === user.grade) && (!n.targetUser || n.targetUser === user.email));
                const currentExamMarks = user.marks ? user.marks[selectedExam] : null;
                const examPercentage = calculatePercentage(currentExamMarks).toFixed(1);

                return (
                    <div className="space-y-6 fade-in">
                        {myNotices.filter(n => n.targetUser === user.email).map(n => (
                            <div key={n.id} className="bg-red-50 border-l-4 border-red-500 p-4 rounded-r-lg shadow-sm"><p className="font-bold text-red-800 flex items-center"><Icons.Bell /><span className="ml-2">Direct Message from Admin</span></p><p className="text-red-700 mt-1">{n.content}</p></div>
                        ))}

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 flex flex-col justify-between h-full">
                                <div><p className="text-sm text-gray-500 font-medium">My Attendance</p><p className="text-4xl font-extrabold text-green-600 mt-2">{user.attendance}%</p></div>
                                <div className="mt-4 text-xs text-gray-400 border-t pt-3">Maintained throughout current semester.</div>
                            </div>
                            <div className="lg:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                                <div className="flex flex-col sm:flex-row justify-between sm:items-end mb-4 gap-3">
                                    <p className="text-sm text-gray-500 font-medium">Academic Performance Tracking</p>
                                    <div className="flex items-center space-x-3">
                                        <select value={selectedExam} onChange={e=>setSelectedExam(e.target.value)} className="text-sm border border-gray-200 rounded px-2 py-1 outline-none focus:border-primary">{EXAMS.map(e => <option key={e} value={e}>{e}</option>)}</select>
                                        <span className="text-sm font-bold bg-indigo-100 text-indigo-700 px-3 py-1 rounded">{examPercentage}%</span>
                                    </div>
                                </div>
                                <div className="flex space-x-4 overflow-x-auto pb-2">
                                    {currentExamMarks ? Object.entries(currentExamMarks).map(([subject, score]) => (

                                    </div>
                                ))}

                    </div>
                );
            };

            const StudentLeaveManagement = () => {
                const [date, setDate] = useState(''); const [reason, setReason] = useState('');
                const myLeaves = db.leaves.filter(l => l.studentEmail === user.email).sort((a,b) => new Date(b.date) - new Date(a.date));
                const handleSubmit = (e) => { e.preventDefault(); updateDB({...db, leaves: [{ id: Date.now(), studentEmail: user.email, studentName: user.name, grade: user.grade, date, reason, status: 'Pending', note: '' }, ...db.leaves]}); setDate(''); setReason(''); triggerToast("Leave request submitted successfully."); };
                return (
                    <div className="fade-in grid grid-cols-1 lg:grid-cols-3 gap-6">

                                    </div>
                                ))}

                    </div>

            // --- TEACHER VIEWS ---
            const AddStudentModal = ({ onClose }) => {
                const [form, setForm] = useState({ name: '', email: '', parentName: '', parentPhone: '', parentEmail: '' });
                const handleAdd = (e) => {
                    e.preventDefault(); if(db.users[form.email.toLowerCase()]) return alert("Email already exists!");
                    const newStudent = { email: form.email.toLowerCase(), name: form.name, role: "student", grade: user.classAssigned, attendance: 100, marks: {}, parentName: form.parentName, parentPhone: form.parentPhone, parentEmail: form.parentEmail, status: "active" };
                    updateDB({...db, users: {...db.users, [newStudent.email]: newStudent}}); triggerToast(`Successfully registered ${form.name}.`); onClose();
                };
                return (
                    <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4 fade-in">

                                <p className="text-xs text-primary font-bold uppercase mb-2">Student Details (Class: {user.classAssigned})</p>
                                <input type="text" placeholder="Full Name" required value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border focus:border-primary outline-none" />
                                <input type="email" placeholder="Email (Login ID)" required value={form.email} onChange={e=>setForm({...form, email: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border focus:border-primary outline-none" />

                                <input type="tel" placeholder="Parent Phone" required value={form.parentPhone} onChange={e=>setForm({...form, parentPhone: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border focus:border-primary outline-none" />
                                <input type="email" placeholder="Parent Email" required value={form.parentEmail} onChange={e=>setForm({...form, parentEmail: e.target.value})} className="w-full text-sm px-3 py-2 rounded-lg border focus:border-primary outline-none" />

                            </form>
                        </div>
                    </div>
                );
            };

            const TeacherGradebook = () => {
                const myStudents = Object.values(db.users).filter(u => u.role === 'student' && u.grade === user.classAssigned);
                const [selectedExam, setSelectedExam] = useState(EXAMS[0]);
                const [editingStudent, setEditingStudent] = useState(null); 
                const [editForm, setEditForm] = useState({});
                const [showAddModal, setShowAddModal] = useState(false);

                const startEdit = (student) => { 
                    setEditingStudent(student.email); 
                    const currentMarks = student.marks?.[selectedExam] || {};
                    if(Object.keys(currentMarks).length === 0) setEditForm({ Math: 0, Science: 0, English: 0 });
                    else setEditForm({ ...currentMarks }); 
                };
                
                const saveEdit = (email) => { 
                    const newDB = { ...db }; 
                    if(!newDB.users[email].marks) newDB.users[email].marks = {};
                    newDB.users[email].marks[selectedExam] = { ...editForm };
                    updateDB(newDB); setEditingStudent(null); triggerToast("Grades updated.");
                };
                
                const handleMarkChange = (subject, val) => { setEditForm({ ...editForm, [subject]: parseInt(val) || 0 }); };
                const addSubject = () => { const subName = prompt("Enter Subject Name:"); if(subName) setEditForm({...editForm, [subName]: 0}); };

                return (
                    <div className="fade-in space-y-6">
                        {showAddModal && <AddStudentModal onClose={() => setShowAddModal(false)} />}
                        
                        <div className="bg-primary rounded-2xl p-6 text-white shadow-md flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div><h2 className="text-2xl font-bold">Class Gradebook</h2><p className="text-indigo-200">Role: {user.isClassTeacher ? "Class Teacher" : "Subject Teacher"} | Class: <strong>{user.classAssigned}</strong></p></div>
                            {user.isClassTeacher && <button onClick={()=>setShowAddModal(true)} className="bg-white text-primary px-4 py-2 rounded-lg font-bold text-sm shadow hover:bg-gray-50 flex items-center"><Icons.Plus /><span className="ml-1">Add Student</span></button>}
                        </div>

                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                            <div className="p-4 border-b border-gray-100 bg-gray-50 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                <h3 className="font-bold text-secondary">Exam Grading Terminal</h3>
                                <div className="flex items-center space-x-2">
                                    <span className="text-sm font-medium text-gray-600">Select Exam:</span>
                                    <select value={selectedExam} onChange={e=>setSelectedExam(e.target.value)} className="text-sm font-bold border border-gray-200 rounded px-3 py-1.5 outline-none focus:border-primary text-primary">{EXAMS.map(e => <option key={e} value={e}>{e}</option>)}</select>
                                </div>
                            </div>
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse min-w-[800px]">
                                    <thead><tr className="bg-white text-gray-500 text-sm border-b"><th className="p-4 font-medium">Student Info</th><th className="p-4 font-medium">Marks for {selectedExam}</th><th className="p-4 font-medium">{selectedExam} %</th><th className="p-4 font-medium text-right">Actions</th></tr></thead>
                                    <tbody className="text-sm text-gray-700">
                                        {myStudents.length===0 && <tr><td colSpan="4" className="p-6 text-center text-gray-400">No students found.</td></tr>}
                                        {myStudents.map((s, i) => {
                                            const isEditing = editingStudent === s.email;
                                            const examMarks = s.marks?.[selectedExam] || {};
                                            const percentage = calculatePercentage(isEditing ? editForm : examMarks).toFixed(1);
                                            return (
                                            <tr key={i} className={`border-b border-gray-50 transition ${isEditing ? 'bg-indigo-50/30' : 'hover:bg-gray-50/50'}`}>
                                                <td className="p-4"><p className="font-bold text-gray-900">{s.name}</p><p className="text-xs text-gray-400">{s.email}</p></td>
                                                <td className="p-4">
                                                    <div className="flex gap-2 flex-wrap items-center">
                                                        {Object.entries(isEditing ? editForm : examMarks).map(([sub, mark]) => (
                                                            <div key={sub} className="flex flex-col border border-gray-200 rounded p-1 text-xs bg-white shadow-sm"><span className="text-gray-400 mb-1">{sub}</span>{isEditing ? <input type="number" max="100" min="0" value={mark} onChange={e => handleMarkChange(sub, e.target.value)} className="w-12 p-0.5 text-center border border-gray-300 rounded font-bold text-primary" /> : <span className="font-bold text-center text-gray-800">{mark}</span>}</div>
                                                        ))}
                                                        {isEditing && <button onClick={addSubject} className="text-xs bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded border border-gray-300">+ Sub</button>}
                                                        {!isEditing && Object.keys(examMarks).length === 0 && <span className="text-xs text-gray-400 italic">No marks entered</span>}
                                                    </div>
                                                </td>
                                                <td className="p-4"><span className={`font-bold ${percentage < 35 ? 'text-red-500' : 'text-primary'}`}>{percentage}%</span></td>
                                                <td className="p-4 text-right">
                                                    {isEditing ? <button onClick={() => saveEdit(s.email)} className="bg-green-500 text-white px-4 py-1.5 rounded text-xs font-bold shadow hover:bg-green-600 transition">Save Grades</button> : <button onClick={() => startEdit(s)} className="text-gray-500 hover:text-primary transition flex items-center justify-end w-full"><Icons.Edit /><span className="ml-1 text-xs font-bold">Edit Grades</span></button>}
                                                </td>
                                            </tr>
                                        )})}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const TeacherAttendance = () => {
                const myStudents = Object.values(db.users).filter(u => u.role === 'student' && u.grade === user.classAssigned);
                const classTimetable = db.timetable.filter(t => t.grade === user.classAssigned);
                const [selectedPeriod, setSelectedPeriod] = useState(classTimetable.length > 0 ? classTimetable[0].id : '');
                const [attendanceMap, setAttendanceMap] = useState({});

                useEffect(() => { const initMap = {}; myStudents.forEach(s => initMap[s.email] = true); setAttendanceMap(initMap); }, [selectedPeriod, db.users]);

                const handleToggle = (email) => setAttendanceMap({...attendanceMap, [email]: !attendanceMap[email]});

                const handleSubmitAttendance = () => {
                    if(!selectedPeriod) return alert("Select a period first.");
                    let notificationLogs = [];
                    myStudents.forEach(student => {
                        if (!attendanceMap[student.email]) {
                            const activeLeave = db.leaves.find(l => l.studentEmail === student.email && l.date === todayStr && l.status === 'Approved');
                            if (!activeLeave) notificationLogs.push(`Email sent to ${student.parentEmail} & SMS to ${student.parentPhone} for ${student.name}'s absence.`);
                        }
                    });
                    if (notificationLogs.length > 0) triggerToast(notificationLogs.join(" \n\n"));
                    else triggerToast("Attendance recorded successfully. All present or on approved leave.");
                };

                return (
                    <div className="fade-in space-y-6 max-w-4xl mx-auto">
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100">
                            <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 border-b pb-4 gap-4">
                                <h3 className="text-lg font-bold text-secondary flex items-center"><Icons.ClipboardCheck /><span className="ml-2">Live Class Attendance</span></h3>
                                <select value={selectedPeriod} onChange={e=>setSelectedPeriod(e.target.value)} className="w-full md:w-auto px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm font-bold text-primary outline-none">
                                    {classTimetable.length === 0 ? <option value="">No periods scheduled</option> : classTimetable.map(c => <option key={c.id} value={c.id}>{c.time} - {c.subject}</option>)}
                                </select>
                            </div>
                            <div className="space-y-3 mb-8">
                                {myStudents.length===0 && <p className="text-center text-gray-400 py-4">No students to track.</p>}
                                {myStudents.map(s => {
                                    const isPresent = attendanceMap[s.email];
                                    const activeLeave = db.leaves.find(l => l.studentEmail === s.email && l.date === todayStr && l.status === 'Approved');
                                    return (
                                    <div key={s.email} className={`flex items-center justify-between p-3 md:p-4 border rounded-xl transition ${activeLeave ? 'bg-orange-50/50 border-orange-200' : isPresent ? 'bg-white border-gray-200' : 'bg-red-50/30 border-red-200'}`}>
                                        <div className="flex items-center space-x-3 md:space-x-4">
                                            <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 font-bold text-xs md:text-sm">{s.name.charAt(0)}</div>
                                            <div><p className="font-bold text-gray-800 text-sm md:text-base">{s.name}</p>{activeLeave && <span className="text-[9px] md:text-[10px] uppercase font-bold bg-orange-100 text-orange-700 px-2 py-0.5 rounded block mt-1">On Approved Leave Today</span>}</div>
                                        </div>
                                        {activeLeave ? <span className="text-sm font-bold text-orange-500">Excused</span> : (
                                            <div className="flex items-center space-x-2 md:space-x-3">
                                                <span className={`text-xs md:text-sm font-bold ${isPresent ? 'text-green-600' : 'text-red-500'}`}>{isPresent ? 'Present' : 'Absent'}</span>

                                            </div>
                                        )}
                                    </div>
                                )})}
                            </div>
                            <button onClick={handleSubmitAttendance} className="w-full bg-primary text-white py-3 md:py-4 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition transform hover:-translate-y-0.5 text-sm md:text-base">Submit Attendance & Notify Parents</button>
                        </div>
                    </div>
                );
            };

            const TeacherTimetable = () => {
                const [targetClass, setTargetClass] = useState(user.classAssigned);
                const [time, setTime] = useState(''); const [subject, setSubject] = useState(''); const [teacherName, setTeacherName] = useState(user.name);
                const handleAdd = (e) => { e.preventDefault(); updateDB({ ...db, timetable: [...db.timetable, { id: Date.now(), grade: targetClass, time, subject, teacher: teacherName }] }); setTime(''); setSubject(''); triggerToast("Timetable updated."); };
                const handleDelete = (id) => updateDB({ ...db, timetable: db.timetable.filter(t => t.id !== id) });
                const viewingTimetable = db.timetable.filter(t => t.grade === targetClass).sort((a,b) => a.time.localeCompare(b.time));

                return (
                    <div className="fade-in space-y-6">
                        <div className="bg-white p-4 md:p-6 rounded-2xl shadow-sm border border-gray-100">

                                <select value={targetClass} onChange={e=>setTargetClass(e.target.value)} className="w-full md:w-auto px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm font-bold text-primary outline-none">{db.classes.map(c => <option key={c} value={c}>View: {c}</option>)}</select>
                            </div>
                            <form onSubmit={handleAdd} className="grid grid-cols-1 md:grid-cols-4 gap-3 bg-indigo-50/50 p-4 rounded-xl mb-6 border border-indigo-100">

                                <input type="text" placeholder="Subject" value={subject} onChange={e=>setSubject(e.target.value)} required className="px-3 py-2 text-sm rounded-lg border outline-none focus:border-primary" />
                                <input type="text" placeholder="Professor Name" value={teacherName} onChange={e=>setTeacherName(e.target.value)} required className="px-3 py-2 text-sm rounded-lg border outline-none focus:border-primary" />
                                <button type="submit" className="bg-primary text-white py-2 rounded-lg text-sm font-bold hover:bg-indigo-700 transition flex items-center justify-center"><Icons.Plus /><span className="ml-1">Add Slot</span></button>
                            </form>
                            <div className="space-y-2">
                                {viewingTimetable.length === 0 && <p className="text-center text-gray-400 py-4 text-sm">No slots created for {targetClass}.</p>}
                                {viewingTimetable.map(t => (
                                    <div key={t.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-4 border border-gray-100 rounded-xl bg-white hover:shadow-sm transition gap-4">
                                        <div className="flex items-center space-x-4"><div className="w-24 text-sm font-bold text-primary bg-indigo-50 py-1 px-2 rounded text-center">{t.time}</div><div><p className="font-bold text-gray-800 text-sm">{t.subject}</p><p className="text-xs text-gray-500">Prof: {t.teacher}</p></div></div>
                                        <button onClick={()=>handleDelete(t.id)} className="p-2 text-red-500 hover:bg-red-50 rounded-lg transition self-end sm:self-auto"><Icons.Trash /></button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const TeacherNoticesAndVideos = () => {
                const [targetClass, setTargetClass] = useState('All'); const [title, setTitle] = useState(''); const [content, setContent] = useState(''); const [type, setType] = useState('Info');

                                    <thead><tr className="bg-gray-50 text-gray-500 text-sm border-b"><th className="p-4 font-medium">Student</th><th className="p-4 font-medium">Parent Contact</th><th className="p-4 font-medium">Status</th><th className="p-4 font-medium text-right">Admin Actions</th></tr></thead>
                                    <tbody className="text-sm text-gray-700">
                                        {students.length===0 && <tr><td colSpan="4" className="p-6 text-center text-gray-400">No records found.</td></tr>}
                                        {students.map(s => (
                                            <tr key={s.email} className={`border-b border-gray-50 hover:bg-gray-50/50 ${s.status === 'blocked' ? 'opacity-50 bg-red-50/20' : ''}`}>
                                                <td className="p-4"><p className="font-bold text-gray-900">{s.name}</p><p className="text-xs text-gray-400">{s.email}</p></td>
                                                <td className="p-4"><p className="text-gray-800">{s.parentName}</p><p className="text-xs text-gray-500">{s.parentPhone}</p></td>
                                                <td className="p-4"><span className={`text-[10px] uppercase font-bold px-2 py-0.5 rounded-full ${s.status === 'blocked' ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`}>{s.status}</span></td>
                                                <td className="p-4 text-right">
                                                    <button onClick={()=>handleBlock(s.email, s.status)} className={`px-3 py-1 text-xs font-bold rounded border transition ${s.status === 'blocked' ? 'text-green-600 border-green-200 hover:bg-green-50' : 'text-red-500 border-red-200 hover:bg-red-50'}`}>{s.status === 'blocked' ? 'Unblock' : 'Block Access'}</button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            const AdminTeachers = () => {
                const teachers = Object.values(db.users).filter(u => u.role === 'teacher');
                const [form, setForm] = useState({ name: '', email: '', isClassTeacher: false, classAssigned: db.classes[0] });

                const handleAdd = (e) => {
                    e.preventDefault(); if(db.users[form.email.toLowerCase()]) return alert("Email exists!");
                    const newT = { email: form.email.toLowerCase(), name: form.name, role: "teacher", isClassTeacher: form.isClassTeacher, classAssigned: form.classAssigned, status: "active" };
                    updateDB({...db, users: {...db.users, [newT.email]: newT}}); triggerToast("Faculty member added.");
                };

                return (
                    <div className="fade-in grid grid-cols-1 xl:grid-cols-3 gap-6">
                        <div className="xl:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                            <h3 className="font-bold text-secondary mb-4 border-b pb-2">Add Faculty Member</h3>
                            <form onSubmit={handleAdd} className="space-y-4">
                                <input type="text" placeholder="Full Name" required value={form.name} onChange={e=>setForm({...form, name: e.target.value})} className="w-full text-sm px-3 py-2 border rounded focus:border-primary outline-none" />
                                <input type="email" placeholder="Email (Login ID)" required value={form.email} onChange={e=>setForm({...form, email: e.target.value})} className="w-full text-sm px-3 py-2 border rounded focus:border-primary outline-none" />
                                <div className="flex items-center space-x-2 py-2">
                                    <input type="checkbox" id="ct" checked={form.isClassTeacher} onChange={e=>setForm({...form, isClassTeacher: e.target.checked})} className="w-4 h-4 text-primary rounded" />
                                    <label htmlFor="ct" className="text-sm font-medium text-gray-700">Assign as Class Teacher</label>
                                </div>
                                <div>
                                    <label className="text-xs font-bold text-gray-500 uppercase mb-1 block">Assign Class Domain</label>
                                    <select value={form.classAssigned} onChange={e=>setForm({...form, classAssigned: e.target.value})} className="w-full text-sm px-3 py-2 border rounded outline-none focus:border-primary">
                                        {db.classes.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <button type="submit" className="w-full bg-primary text-white py-2 rounded font-bold hover:bg-indigo-700">Create Account</button>
                            </form>
                        </div>
                        <div className="xl:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="font-bold text-secondary mb-4 border-b pb-2">Faculty Roster</h3>
                            <div className="space-y-3">
                                {teachers.map(t => (
                                    <div key={t.email} className="p-4 border border-gray-100 rounded-xl bg-gray-50 flex justify-between items-center">
                                        <div><p className="font-bold text-gray-900">{t.name}</p><p className="text-xs text-gray-500">{t.email}</p></div>
                                        <div className="text-right">
                                            <span className={`text-[10px] font-bold uppercase px-2 py-1 rounded border ${t.isClassTeacher ? 'bg-primary/10 text-primary border-primary/20' : 'bg-gray-200 text-gray-600 border-gray-300'}`}>{t.isClassTeacher ? 'Class Teacher' : 'Subject Teacher'}</span>
                                            <p className="text-xs font-bold text-gray-600 mt-1 text-right">{t.classAssigned}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const AdminSettings = () => {
                const [targetUser, setTargetUser] = useState(''); const [notice, setNotice] = useState('');
                const toggleSetting = (key) => updateDB({...db, settings: {...db.settings, [key]: !db.settings[key]}});
                const sendDirectMessage = (e) => {
                    e.preventDefault(); if(!db.users[targetUser]) return alert("User email not found.");
                    updateDB({...db, notices: [{ id: Date.now(), date: "Just now", title: "Direct Message", content: notice, type: "Urgent", targetClass: "All", targetUser: targetUser }, ...db.notices]});
                    setTargetUser(''); setNotice(''); triggerToast("Direct message delivered.");
                };

                return (
                    <div className="fade-in grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                            <h3 className="font-bold text-secondary mb-6 border-b pb-2 flex items-center"><Icons.Toggle /><span className="ml-2">Platform Global Settings</span></h3>
                            <div className="space-y-6">
                                <div className="flex justify-between items-center"><div className="w-2/3"><p className="font-bold text-gray-800">Enable Video Library</p><p className="text-xs text-gray-500">Allows teachers to upload and students to view videos.</p></div>
                                    <div className="relative inline-block w-12 align-middle select-none"><input type="checkbox" checked={db.settings.enableVideos} onChange={()=>toggleSetting('enableVideos')} className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-transform duration-200 ease-in-out"/><label className={`toggle-label block overflow-hidden h-6 rounded-full cursor-pointer transition-colors ${db.settings.enableVideos ? 'bg-primary' : 'bg-gray-300'}`}></label></div>
                                </div>
                                <div className="flex justify-between items-center"><div className="w-2/3"><p className="font-bold text-gray-800">Enable Leave Requests</p><p className="text-xs text-gray-500">Enable student leave system.</p></div>
                                    <div className="relative inline-block w-12 align-middle select-none"><input type="checkbox" checked={db.settings.enableLeaves} onChange={()=>toggleSetting('enableLeaves')} className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-transform duration-200 ease-in-out"/><label className={`toggle-label block overflow-hidden h-6 rounded-full cursor-pointer transition-colors ${db.settings.enableLeaves ? 'bg-primary' : 'bg-gray-300'}`}></label></div>
                                </div>
                                <div className="flex justify-between items-center"><div className="w-2/3"><p className="font-bold text-gray-800">Global Notice Board</p><p className="text-xs text-gray-500">Toggle the notice board widget on student dashboards.</p></div>
                                    <div className="relative inline-block w-12 align-middle select-none"><input type="checkbox" checked={db.settings.enableNotices} onChange={()=>toggleSetting('enableNotices')} className="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-300 appearance-none cursor-pointer transition-transform duration-200 ease-in-out"/><label className={`toggle-label block overflow-hidden h-6 rounded-full cursor-pointer transition-colors ${db.settings.enableNotices ? 'bg-primary' : 'bg-gray-300'}`}></label></div>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                            <h3 className="font-bold text-red-600 mb-4 border-b pb-2 flex items-center"><Icons.Bell /><span className="ml-2">Direct User Intercom</span></h3>
                            <form onSubmit={sendDirectMessage} className="space-y-4">
                                <p className="text-sm text-gray-500">Send an urgent, direct alert that appears pinned at the top of a specific user's dashboard.</p>
                                <input type="email" placeholder="Target User Email (e.g. student10@school.com)" required value={targetUser} onChange={e=>setTargetUser(e.target.value)} className="w-full text-sm px-3 py-2 border rounded focus:border-red-500 outline-none" />
                                <textarea placeholder="Message content..." required value={notice} onChange={e=>setNotice(e.target.value)} rows="3" className="w-full text-sm px-3 py-2 border rounded focus:border-red-500 outline-none resize-none"></textarea>
                                <button type="submit" className="w-full bg-red-500 text-white py-2 rounded font-bold hover:bg-red-600">Dispatch Intercom Message</button>
                            </form>
                        </div>
                    </div>
                );
            };

            // --- Navigation Logic ---
            if (view === 'landing') return <LandingPage onNavigate={setView} db={db} />;
            if (view === 'login') return <LoginPage onLogin={handleLogin} db={db} />;
            
            let navItems = [];
            if (user?.role === 'student') {
                navItems.push({ id: 'home', label: 'My Dashboard', icon: <Icons.Calendar /> });
                if(db.settings.enableVideos) navItems.push({ id: 'videos', label: 'My Class Videos', icon: <Icons.Video /> });
                if(db.settings.enableLeaves) navItems.push({ id: 'leave', label: 'Leave Requests', icon: <Icons.FileText /> });
            } else if (user?.role === 'teacher') {
                navItems.push({ id: 'home', label: 'Gradebook', icon: <Icons.Edit /> });
                navItems.push({ id: 'attendance', label: 'Live Attendance', icon: <Icons.ClipboardCheck /> });
                if (user.isClassTeacher) {
                    if(db.settings.enableLeaves) navItems.push({ id: 'leaves', label: 'Leave Approvals', icon: <Icons.FileText /> });
                    navItems.push({ id: 'timetable', label: 'Timetable Manager', icon: <Icons.Calendar /> });
                }
                if(db.settings.enableVideos || db.settings.enableNotices) navItems.push({ id: 'content', label: 'Publisher Tools', icon: <Icons.BookOpen /> });
            } else if (user?.role === 'admin') {
                navItems = [
                    { id: 'home', label: 'Principal Dashboard', icon: <Icons.Chart /> },
                    { id: 'directory', label: 'Global Directory', icon: <Icons.Users /> },
                    { id: 'teachers', label: 'Faculty Management', icon: <Icons.Edit /> },
                    { id: 'settings', label: 'Platform Settings', icon: <Icons.Toggle /> }
                ];
            }

            return (
                <div className="min-h-screen bg-background flex flex-col md:flex-row relative">
                    {toastMessage && <Toast message={toastMessage} onClose={() => setToastMessage(null)} />}
                    <div className="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center sticky top-0 z-40">
                        <div className="flex items-center space-x-2 text-primary font-bold"><Icons.GraduationCap /> <span className="truncate">{db.name}</span></div>
                        <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="text-gray-600"><Icons.Menu /></button>
                    </div>
                    {mobileMenuOpen && <div className="md:hidden fixed inset-0 bg-black/50 z-40 backdrop-blur-sm" onClick={()=>setMobileMenuOpen(false)}></div>}
                    <aside className={`w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full z-50 shadow-2xl md:shadow-sm transition-transform duration-300 ease-in-out ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}`}>
                        <div className="p-6 hidden md:flex items-center space-x-2 text-primary font-bold text-xl border-b border-gray-50"><Icons.GraduationCap /> <span className="truncate">{db.name}</span></div>
                        <div className="p-6 flex items-center space-x-3 bg-gray-50/50 border-b md:border-0 border-gray-100">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-bold shadow-inner ${user?.role === 'admin' ? 'bg-purple-600' : 'bg-primary'}`}>{user?.name.charAt(0)}</div>
                            <div className="overflow-hidden"><div className="font-bold text-gray-800 text-sm truncate">{user?.name}</div><div className="text-xs text-primary font-medium uppercase tracking-wider">{user?.role}</div></div>
                        </div>
                        <nav className="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                            {navItems.map(item => (
                                <button key={item.id} onClick={() => navClick(item.id)} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-bold transition ${activeTab === item.id ? (user?.role === 'admin' ? 'bg-purple-600 text-white' : 'bg-primary text-white') : 'text-gray-500 hover:bg-gray-100 hover:text-gray-900'}`}>
                                    {item.icon} <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 mt-auto border-t border-gray-100"><button onClick={handleLogout} className="w-full flex items-center justify-center space-x-2 px-4 py-3 rounded-xl text-sm font-bold text-red-500 bg-red-50 hover:bg-red-100 transition"><Icons.LogOut /> <span>Secure Logout</span></button></div>
                    </aside>
                    <main className="flex-1 md:ml-64 p-4 md:p-8 overflow-y-auto">
                        <div className="hidden md:flex justify-between items-center mb-8">
                            <div><h1 className="text-3xl font-extrabold text-secondary capitalize">{activeTab.replace('-', ' ')}</h1><p className="text-gray-500 text-sm mt-1">{new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p></div>
                        </div>
                        
                        {/* Render based on roles */}
                        {user?.role === 'student' && activeTab === 'home' && <StudentHome />}
                        {user?.role === 'student' && activeTab === 'videos' && <StudentVideos />}
                        {user?.role === 'student' && activeTab === 'leave' && <StudentLeaveManagement />}
                        
                        {user?.role === 'teacher' && activeTab === 'home' && <TeacherGradebook />}
                        {user?.role === 'teacher' && activeTab === 'attendance' && <TeacherAttendance />}
                        {user?.role === 'teacher' && activeTab === 'leaves' && user.isClassTeacher && <TeacherLeaveApproval />}
                        {user?.role === 'teacher' && activeTab === 'timetable' && user.isClassTeacher && <TeacherTimetable />}
                        {user?.role === 'teacher' && activeTab === 'content' && <TeacherNoticesAndVideos />}

                        {user?.role === 'admin' && activeTab === 'home' && <AdminDashboard />}
                        {user?.role === 'admin' && activeTab === 'directory' && <AdminDirectory />}
                        {user?.role === 'admin' && activeTab === 'teachers' && <AdminTeachers />}
                        {user?.role === 'admin' && activeTab === 'settings' && <AdminSettings />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
