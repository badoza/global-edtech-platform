<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global EdTech | Premium Campus Platform</title>
    
    <!-- Tailwind CSS for Premium Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Loaded directly in browser) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel to compile JSX in the browser -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5', // Indigo 600
                        secondary: '#1e293b', // Slate 800
                        accent: '#ec4899', // Pink 500
                        background: '#f8fafc', // Slate 50
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        .fade-in { animation: fadeIn 0.4s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- MOCK DATA ---
        const schoolDetails = {
            name: "Apex Global Academy",
            tagline: "Empowering the Leaders of Tomorrow",
            about: "A premier institution dedicated to academic excellence, holistic development, and modern learning methodologies. We integrate technology with traditional values to provide a world-class education.",
            stats: { students: "2,500+", teachers: "150+", courses: "40+" }
        };

        const mockNotices = [
            { id: 1, date: "Oct 24", title: "Mid-Term Exam Schedule Released", type: "Urgent" },
            { id: 2, date: "Oct 20", title: "Annual Science Fair Registration", type: "Info" },
            { id: 3, date: "Oct 15", title: "Campus Maintenance Tomorrow", type: "Alert" }
        ];

        const mockTimetable = [
            { time: "09:00 AM", subject: "Advanced Mathematics", teacher: "Prof. Sarah Jenkins" },
            { time: "10:30 AM", subject: "Physics (Theory)", teacher: "Dr. Alan Grant" },
            { time: "12:00 PM", subject: "Lunch Break", teacher: "-" },
            { time: "01:00 PM", subject: "Computer Science", teacher: "Mr. David Chen" }
        ];

        const mockMaterials = [
            { id: 1, title: "Chapter 4: Calculus PDF", subject: "Math", size: "2.4 MB" },
            { id: 2, title: "Thermodynamics Notes", subject: "Physics", size: "1.8 MB" },
            { id: 3, title: "Python Basics Syllabus", subject: "CS", size: "0.5 MB" }
        ];

        const mockVideos = [
            { id: 1, title: "Understanding React Hooks", teacher: "David Chen", duration: "14:20", thumbnail: "https://images.unsplash.com/photo-1633356122544-f134324a6cee?w=500&q=80" },
            { id: 2, title: "Newton's Laws Explained", teacher: "Alan Grant", duration: "22:15", thumbnail: "https://images.unsplash.com/photo-1636466497217-26a8cbeaf0aa?w=500&q=80" },
            { id: 3, title: "Integration Tricks", teacher: "Sarah Jenkins", duration: "18:45", thumbnail: "https://images.unsplash.com/photo-1509228468518-180dd4864904?w=500&q=80" }
        ];

        // --- ICONS (SVG) ---
        const Icons = {
            GraduationCap: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>,
            BookOpen: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
            Video: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>,
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            Bell: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
            User: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            LogOut: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        };

        // --- COMPONENTS ---

        // 1. Landing Page (Public)
        const LandingPage = ({ onNavigate }) => (
            <div className="min-h-screen flex flex-col fade-in">
                {/* Navbar */}
                <nav className="bg-white px-6 py-4 flex justify-between items-center shadow-sm sticky top-0 z-50">
                    <div className="flex items-center space-x-2 text-primary font-bold text-2xl tracking-tight">
                        <Icons.GraduationCap />
                        <span>{schoolDetails.name}</span>
                    </div>
                    <div className="space-x-4">
                        <button onClick={() => onNavigate('login')} className="text-secondary font-medium hover:text-primary transition">Login</button>
                        <button onClick={() => onNavigate('login')} className="bg-primary text-white px-5 py-2 rounded-full font-medium hover:bg-indigo-700 shadow-md transition">Portal Access</button>
                    </div>
                </nav>

                {/* Hero Section */}
                <div className="flex-1 flex flex-col items-center justify-center text-center px-4 py-20 bg-gradient-to-br from-indigo-50 to-white">
                    <span className="bg-indigo-100 text-primary px-4 py-1 rounded-full text-sm font-semibold tracking-wide mb-6 inline-block">Admissions Open 2024</span>
                    <h1 className="text-5xl md:text-7xl font-extrabold text-secondary mb-6 leading-tight max-w-4xl">
                        {schoolDetails.tagline}
                    </h1>
                    <p className="text-lg md:text-xl text-gray-500 mb-10 max-w-2xl leading-relaxed">
                        {schoolDetails.about}
                    </p>
                    <div className="flex space-x-4">
                        <button onClick={() => onNavigate('login')} className="bg-secondary text-white px-8 py-3.5 rounded-full font-semibold hover:bg-gray-800 shadow-lg transition transform hover:-translate-y-0.5">
                            Student Login
                        </button>
                        <button onClick={() => onNavigate('login', 'admin')} className="bg-white text-secondary border border-gray-200 px-8 py-3.5 rounded-full font-semibold hover:bg-gray-50 shadow-sm transition">
                            Admin Login
                        </button>
                    </div>
                </div>

                {/* Stats Section */}
                <div className="bg-white py-16 border-t border-gray-100">
                    <div className="max-w-5xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                        <div>
                            <div className="text-4xl font-bold text-primary mb-2">{schoolDetails.stats.students}</div>
                            <div className="text-gray-500 font-medium">Active Students</div>
                        </div>
                        <div>
                            <div className="text-4xl font-bold text-primary mb-2">{schoolDetails.stats.teachers}</div>
                            <div className="text-gray-500 font-medium">Expert Faculty</div>
                        </div>
                        <div>
                            <div className="text-4xl font-bold text-primary mb-2">{schoolDetails.stats.courses}</div>
                            <div className="text-gray-500 font-medium">Programs Offered</div>
                        </div>
                    </div>
                </div>
            </div>
        );

        // 2. Login Page
        const LoginPage = ({ onLogin, defaultRole }) => {
            const [role, setRole] = useState(defaultRole || 'student');
            const [identifier, setIdentifier] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                // Mock Authentication - Accept any credentials for the prototype
                onLogin({ name: identifier || (role === 'admin' ? 'Admin User' : 'Student User'), role: role });
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4 fade-in">
                    <div className="glass-card w-full max-w-md p-8 rounded-3xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-primary to-accent"></div>
                        
                        <div className="flex justify-center mb-6 text-primary">
                            <Icons.GraduationCap />
                        </div>
                        
                        <h2 className="text-3xl font-bold text-center text-secondary mb-2">Welcome Back</h2>
                        <p className="text-center text-gray-500 mb-8">Enter your details to access the portal.</p>

                        <div className="flex bg-gray-100 p-1 rounded-xl mb-6">
                            <button 
                                className={`flex-1 py-2 rounded-lg text-sm font-medium transition ${role === 'student' ? 'bg-white shadow text-primary' : 'text-gray-500 hover:text-gray-700'}`}
                                onClick={() => setRole('student')}
                            >
                                Student
                            </button>
                            <button 
                                className={`flex-1 py-2 rounded-lg text-sm font-medium transition ${role === 'admin' ? 'bg-white shadow text-primary' : 'text-gray-500 hover:text-gray-700'}`}
                                onClick={() => setRole('admin')}
                            >
                                Admin/Staff
                            </button>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-5">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Mobile Number / Student ID</label>
                                <input 
                                    type="text" 
                                    className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition"
                                    placeholder={role === 'student' ? "+1 234 567 8900" : "Admin ID"}
                                    value={identifier}
                                    onChange={(e) => setIdentifier(e.target.value)}
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Password / OTP</label>
                                <input 
                                    type="password" 
                                    className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition"
                                    placeholder="••••••••"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                />
                            </div>
                            <div className="flex items-center justify-between text-sm">
                                <label className="flex items-center text-gray-500">
                                    <input type="checkbox" className="mr-2 rounded text-primary focus:ring-primary" /> Remember me
                                </label>
                                <a href="#" className="text-primary font-medium hover:underline">Forgot password?</a>
                            </div>
                            <button type="submit" className="w-full bg-primary text-white py-3.5 rounded-xl font-bold hover:bg-indigo-700 shadow-md transition transform hover:-translate-y-0.5">
                                Login as {role === 'student' ? 'Student' : 'Admin'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // 3. Main Application Shell (Sidebar + Content)
        const DashboardLayout = ({ user, onLogout, children, activeTab, setActiveTab }) => {
            const navItems = user.role === 'student' 
                ? [
                    { id: 'home', label: 'Dashboard', icon: <Icons.Calendar /> },
                    { id: 'materials', label: 'Study Materials', icon: <Icons.BookOpen /> },
                    { id: 'videos', label: 'Video Lectures', icon: <Icons.Video /> },
                  ]
                : [
                    { id: 'home', label: 'Admin Panel', icon: <Icons.Settings /> },
                  ];

            return (
                <div className="min-h-screen bg-background flex fade-in">
                    {/* Sidebar */}
                    <aside className="w-64 bg-white border-r border-gray-200 flex flex-col fixed h-full z-10">
                        <div className="p-6 flex items-center space-x-2 text-primary font-bold text-xl">
                            <Icons.GraduationCap />
                            <span className="truncate">{schoolDetails.name}</span>
                        </div>
                        
                        <div className="px-6 py-4 border-b border-gray-100 mb-4">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-primary font-bold">
                                    {user.name.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <div className="font-semibold text-gray-800 text-sm truncate w-32">{user.name}</div>
                                    <div className="text-xs text-gray-500 capitalize">{user.role}</div>
                                </div>
                            </div>
                        </div>

                        <nav className="flex-1 px-4 space-y-1">
                            {navItems.map(item => (
                                <button 
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium transition ${activeTab === item.id ? 'bg-primary text-white shadow-md' : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900'}`}
                                >
                                    {item.icon}
                                    <span>{item.label}</span>
                                </button>
                            ))}
                        </nav>

                        <div className="p-4 border-t border-gray-200">
                            <button onClick={onLogout} className="w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium text-red-500 hover:bg-red-50 transition">
                                <Icons.LogOut />
                                <span>Log Out</span>
                            </button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 ml-64 p-8">
                        {/* Header area with Notifications */}
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h1 className="text-2xl font-bold text-secondary capitalize">{activeTab.replace('-', ' ')}</h1>
                                <p className="text-gray-500 text-sm mt-1">Academic Year 2023-2024</p>
                            </div>
                            <button className="p-2 rounded-full bg-white border border-gray-200 text-gray-500 hover:text-primary relative shadow-sm">
                                <Icons.Bell />
                                <span className="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></span>
                            </button>
                        </div>
                        
                        {children}
                    </main>
                </div>
            );
        };

        // Sub-views for Student Dashboard
        const StudentHome = () => (
            <div className="space-y-6 fade-in">
                {/* Stats Row */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div className="glass-card p-6 rounded-2xl flex items-center space-x-4">
                        <div className="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-green-600"><Icons.User /></div>
                        <div>
                            <div className="text-sm text-gray-500 font-medium">Attendance</div>
                            <div className="text-2xl font-bold text-gray-800">92.5%</div>
                        </div>
                    </div>
                    <div className="glass-card p-6 rounded-2xl flex items-center space-x-4">
                        <div className="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"><Icons.BookOpen /></div>
                        <div>
                            <div className="text-sm text-gray-500 font-medium">Next Class</div>
                            <div className="text-xl font-bold text-gray-800 truncate">Physics</div>
                        </div>
                    </div>
                    <div className="glass-card p-6 rounded-2xl flex items-center space-x-4">
                        <div className="w-12 h-12 rounded-full bg-purple-100 flex items-center justify-center text-purple-600"><Icons.Calendar /></div>
                        <div>
                            <div className="text-sm text-gray-500 font-medium">Upcoming Exams</div>
                            <div className="text-2xl font-bold text-gray-800">3 Days</div>
                        </div>
                    </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    {/* Timetable */}
                    <div className="lg:col-span-2 glass-card rounded-2xl p-6">
                        <h3 className="text-lg font-bold text-secondary mb-4 flex items-center"><Icons.Calendar /><span className="ml-2">Today's Timetable</span></h3>
                        <div className="space-y-4">
                            {mockTimetable.map((cls, idx) => (
                                <div key={idx} className="flex items-center p-4 border border-gray-100 rounded-xl hover:shadow-sm transition bg-white">
                                    <div className="w-24 text-sm font-bold text-primary">{cls.time}</div>
                                    <div className="flex-1">
                                        <div className="font-semibold text-gray-800">{cls.subject}</div>
                                        <div className="text-xs text-gray-500">{cls.teacher}</div>
                                    </div>
                                    <span className="text-xs px-2 py-1 rounded bg-gray-100 text-gray-600 font-medium">{cls.subject === "Lunch Break" ? 'Break' : 'Room 302'}</span>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Notice Board */}
                    <div className="glass-card rounded-2xl p-6 bg-gradient-to-b from-white to-indigo-50/30">
                        <h3 className="text-lg font-bold text-secondary mb-4 flex items-center"><Icons.Bell /><span className="ml-2">Notice Board</span></h3>
                        <div className="space-y-4">
                            {mockNotices.map(notice => (
                                <div key={notice.id} className="p-4 bg-white border border-gray-100 rounded-xl shadow-sm border-l-4 border-l-primary">
                                    <div className="flex justify-between items-start mb-1">
                                        <span className={`text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full ${notice.type === 'Urgent' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`}>{notice.type}</span>
                                        <span className="text-xs text-gray-400 font-medium">{notice.date}</span>
                                    </div>
                                    <p className="text-sm font-semibold text-gray-800 mt-2">{notice.title}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const StudentMaterials = () => (
            <div className="glass-card p-6 rounded-2xl fade-in min-h-[60vh]">
                <div className="flex justify-between items-center mb-6">
                    <h3 className="text-lg font-bold text-secondary">Course Syllabus & PDFs</h3>
                    <select className="border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-600 outline-none focus:border-primary">
                        <option>All Subjects</option>
                        <option>Mathematics</option>
                        <option>Physics</option>
                        <option>Computer Science</option>
                    </select>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {mockMaterials.map(mat => (
                        <div key={mat.id} className="border border-gray-100 p-5 rounded-xl flex items-center justify-between hover:shadow-md transition bg-white group cursor-pointer">
                            <div className="flex items-center space-x-4">
                                <div className="w-10 h-10 rounded-lg bg-red-50 flex items-center justify-center text-red-500">
                                    <Icons.BookOpen />
                                </div>
                                <div>
                                    <p className="font-semibold text-gray-800 text-sm truncate w-32">{mat.title}</p>
                                    <p className="text-xs text-gray-400 mt-0.5">{mat.subject} • {mat.size}</p>
                                </div>
                            </div>
                            <button className="text-gray-400 group-hover:text-primary transition p-2 bg-gray-50 rounded-full group-hover:bg-indigo-50">
                                <Icons.Download />
                            </button>
                        </div>
                    ))}
                </div>
            </div>
        );

        const StudentVideos = () => (
            <div className="fade-in min-h-[60vh]">
                <h3 className="text-lg font-bold text-secondary mb-6">Informative Class Videos</h3>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {mockVideos.map(video => (
                        <div key={video.id} className="glass-card rounded-2xl overflow-hidden hover:shadow-lg transition cursor-pointer group bg-white">
                            <div className="h-40 bg-gray-200 relative overflow-hidden">
                                <img src={video.thumbnail} alt={video.title} className="w-full h-full object-cover group-hover:scale-105 transition duration-500" />
                                <div className="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition flex items-center justify-center">
                                    <div className="w-12 h-12 bg-white/90 backdrop-blur rounded-full flex items-center justify-center text-primary shadow-lg transform group-hover:scale-110 transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                                    </div>
                                </div>
                                <span className="absolute bottom-2 right-2 bg-black/70 text-white text-xs px-2 py-1 rounded font-medium backdrop-blur-sm">{video.duration}</span>
                            </div>
                            <div className="p-5">
                                <h4 className="font-bold text-gray-800 mb-1 line-clamp-1">{video.title}</h4>
                                <p className="text-sm text-gray-500 flex items-center">
                                    <span className="w-5 h-5 rounded-full bg-gray-200 mr-2 flex items-center justify-center text-[10px] text-gray-600">{video.teacher.charAt(0)}</span>
                                    Uploaded by {video.teacher}
                                </p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // Mock Admin View
        const AdminHome = () => (
            <div className="fade-in space-y-6">
                <div className="bg-gradient-to-r from-primary to-indigo-800 rounded-2xl p-8 text-white shadow-lg">
                    <h2 className="text-2xl font-bold mb-2">Welcome to Admin Control</h2>
                    <p className="text-indigo-100 opacity-90 max-w-2xl">From here you can manage students, update the academic calendar, post notices, and upload syllabus PDFs.</p>
                    <div className="mt-6 flex space-x-3">
                        <button className="bg-white text-primary px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-gray-50 transition">Add New Notice</button>
                        <button className="bg-indigo-700 border border-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-indigo-600 transition">Manage Timetable</button>
                    </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="glass-card p-6 rounded-2xl">
                        <h3 className="font-bold text-secondary mb-4 border-b pb-2">Recent System Activity</h3>
                        <ul className="space-y-3 text-sm text-gray-600">
                            <li className="flex justify-between"><span>Prof. Jenkins uploaded 'Calculus PDF'</span> <span className="text-gray-400">10 mins ago</span></li>
                            <li className="flex justify-between"><span>New student registration (ID: #4092)</span> <span className="text-gray-400">1 hr ago</span></li>
                            <li className="flex justify-between"><span>Mid-Term Notice broadcasted</span> <span className="text-gray-400">3 hrs ago</span></li>
                        </ul>
                    </div>
                    <div className="glass-card p-6 rounded-2xl bg-gray-50 border border-dashed border-gray-300 flex flex-col items-center justify-center text-center">
                        <Icons.Settings />
                        <h3 className="font-bold text-secondary mt-2">More Modules coming soon</h3>
                        <p className="text-sm text-gray-500 mt-1">Attendance tracking and Fee management UI can be added here.</p>
                    </div>
                </div>
            </div>
        )


        // --- MAIN APP COMPONENT ---
        const App = () => {
            const [view, setView] = useState('landing'); // landing, login, dashboard
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home'); // home, materials, videos

            const navigateTo = (targetView, roleObj = null) => {
                setView(targetView);
                if (roleObj) window.tempRole = roleObj; // simple way to pass role intent to login
            };

            const handleLogin = (userData) => {
                setUser(userData);
                setActiveTab('home');
                setView('dashboard');
            };

            const handleLogout = () => {
                setUser(null);
                setView('landing');
            };

            return (
                <div className="text-gray-800 antialiased selection:bg-primary selection:text-white">
                    {view === 'landing' && <LandingPage onNavigate={navigateTo} />}
                    {view === 'login' && <LoginPage onLogin={handleLogin} defaultRole={window.tempRole} />}
                    {view === 'dashboard' && user && (
                        <DashboardLayout user={user} onLogout={handleLogout} activeTab={activeTab} setActiveTab={setActiveTab}>
                            {user.role === 'student' && activeTab === 'home' && <StudentHome />}
                            {user.role === 'student' && activeTab === 'materials' && <StudentMaterials />}
                            {user.role === 'student' && activeTab === 'videos' && <StudentVideos />}
                            
                            {user.role === 'admin' && activeTab === 'home' && <AdminHome />}
                        </DashboardLayout>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
